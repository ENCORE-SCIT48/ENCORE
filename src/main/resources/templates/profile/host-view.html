<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호스트 프로필 정보 - Encore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/profile/host-view.css}">
</head>
<body>

<div class="view-container">
    <div class="profile-header">
        <div class="img-wrapper">
            <img th:src="${profile.profileImageUrl != null && profile.profileImageUrl != '' ? profile.profileImageUrl : '/image/default-profile.png'}"
                 class="host-img" alt="프로필 이미지">
            <i th:if="${profile.verified}" class="bi bi-patch-check-fill status-badge"></i>
        </div>
        <h3 class="fw-bold mt-2" th:text="${profile.organizationName}">단체명</h3>
        <p class="text-muted small" th:text="${profile.businessEmail}">host@example.com</p>
    </div>

    <div class="section-title">호스트 프로필</div>
    <div class="info-card">
        <div class="info-item">
            <span class="info-label">대표자명</span>
            <span class="info-value" th:text="${profile.representativeName}">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">사업자 번호</span>
            <span class="info-value fw-bold text-primary-red" th:text="${profile.businessNumber}">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">개업 일자</span>
            <span class="info-value" th:text="${profile.openingDate}">-</span>
        </div>
    </div>

    <div class="section-title">비즈니스 연락처</div>
    <div class="info-card">
        <div class="info-item">
            <span class="info-label">연락처</span>
            <span class="info-value" th:text="${profile.contactNumber}">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">이메일</span>
            <span class="info-value" th:text="${profile.businessEmail}">-</span>
        </div>
    </div>

    <div class="d-grid gap-2 mt-5">
        <a th:href="@{/hostprofile/setup}" class="btn btn-edit">정보 수정하기</a>
        <div class="text-center mt-3 d-flex flex-column gap-2 align-items-center">
            <a th:href="@{/mypage}" class="btn-home">마이페이지로</a>
            <a th:href="@{/feed}" class="btn-home">홈으로</a>
        </div>
    </div>
</div>

</body>
</html>
