<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관람객 프로필 설정 - Encore</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/profile/select.css}">
    <link rel="stylesheet" th:href="@{/css/profile/user-setup.css}">

    <script defer th:src="@{/js/profile/user-setup.js}"></script>
</head>
<body>

<div class="setup-container">
    <header class="text-center mb-5">
        <h2 class="fw-bold">관람객 프로필 설정</h2>
        <p class="text-muted">현장의 감동을 함께할 프로필 정보를 입력해주세요.</p>
    </header>

    <form th:action="@{/userprofile/setup}" th:object="${profile}" method="post" enctype="multipart/form-data">

        <div class="profile-upload">
            <div class="profile-circle">
                <img id="preview" th:src="*{profileImageUrl} ?: '/image/default-profile.png'" class="profile-img">
                <label for="fileInput" class="upload-badge">
                    <i class="bi bi-camera-fill"></i>
                </label>
            </div>
            <input type="file" id="fileInput" name="profileImage" accept="image/*" style="display:none">
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">전화번호</label>
            <input type="tel" th:field="*{phoneNumber}" class="form-control" placeholder="010-0000-0000">
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">생년월일</label>
            <input type="date"
                       name="birthDate"
                       th:value="${profile.birthDate != null ? #temporals.format(profile.birthDate, 'yyyy-MM-dd') : ''}"
                       class="form-control">
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">활동 선호 지역</label>
            <select th:field="*{location}" class="form-select">
                <option value="">지역을 선택해주세요</option>
                <optgroup label="특별시/자치시">
                    <option value="서울특별시">서울특별시</option>
                    <option value="세종특별자치시">세종특별자치시</option>
                </optgroup>
                <optgroup label="광역시">
                    <option value="인천광역시">인천광역시</option>
                    <option value="대전광역시">대전광역시</option>
                    <option value="대구광역시">대구광역시</option>
                    <option value="광주광역시">광주광역시</option>
                    <option value="울산광역시">울산광역시</option>
                    <option value="부산광역시">부산광역시</option>
                </optgroup>
                <optgroup label="도 단위 (남/북)">
                    <option value="경기도">경기도</option>
                    <option value="강원특별자치도">강원특별자치도</option>
                    <option value="충청북도">충청북도</option>
                    <option value="충청남도">충청남도</option>
                    <option value="전라북도">전라북도</option>
                    <option value="전라남도">전라남도</option>
                    <option value="경상북도">경상북도</option>
                    <option value="경상남도">경상남도</option>
                    <option value="제주특별자치도">제주특별자치도</option>
                </optgroup>
            </select>
        </div>

        <div class="section-title">선호 음악 장르</div>
        <div class="checkbox-grid">
            <label th:each="g : ${genreOptions}" class="check-item">
                <input type="checkbox" name="preferredGenres" th:value="${g}"
                       th:checked="${profile.preferredGenres != null and profile.preferredGenres.contains(g)}">
                <span th:text="${g}"></span>
            </label>
        </div>

        <div class="section-title">선호 공연 형태</div>
        <div class="checkbox-grid">
            <label th:each="t : ${typeOptions}" class="check-item">
                <input type="checkbox" name="preferredPerformanceTypes" th:value="${t}"
                       th:checked="${profile.preferredPerformanceTypes != null and profile.preferredPerformanceTypes.contains(t)}">
                <span th:text="${t}"></span>
            </label>
        </div>

        <div class="mt-5">
            <label class="form-label fw-bold">나의 소개</label>
            <textarea th:field="*{introduction}" class="form-control" rows="4"
                      placeholder="좋아하는 아티스트나 나를 표현할 수 있는 키워드를 적어주세요."></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-save">변경사항 저장하기</button>
    </form>

    <div class="text-center mt-3">
        <a href="javascript:history.back()" class="text-decoration-none text-muted" style="font-size: 0.9rem;">취소하고 돌아가기</a>
    </div>
</div>

</body>
</html>
