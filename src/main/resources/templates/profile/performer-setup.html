<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아티스트 프로필 설정 - Encore</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/profile/performer-setup.css}">

    <script defer th:src="@{/js/profile/performer-setup.js}"></script>
</head>
<body>

<div class="setup-container">
    <header class="text-center mb-5 position-relative">
        <a th:href="@{/mypage}" class="profile-back-btn" title="뒤로"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold">아티스트 프로필 설정</h2>
        <p class="text-muted">무대 위에서의 당신을 표현할 정보를 입력해주세요.</p>
    </header>

    <form th:action="@{/performerprofile/setup}" th:object="${profile}" method="post" enctype="multipart/form-data">

        <div class="profile-upload">
            <img id="preview"
                 th:src="${profile.profileImageUrl != null ? profile.profileImageUrl : '/image/default-profile.png'}"
                 class="profile-img">
            <label for="fileInput" class="upload-badge">
                <i class="bi bi-camera-fill"></i>
            </label>

            <input type="file" id="fileInput" name="profileImage" accept="image/*" class="d-none">
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">활동명 (Stage Name)</label>
            <input type="text" th:field="*{stageName}" id="stageName" class="form-control" placeholder="예: 앙코르 밴드">
        </div>

        <div class="mb-4">
            <div class="section-title">활동 포지션</div>
            <div class="checkbox-grid mb-4">
                <label th:each="p : ${partOptions}" class="check-item">
                    <input type="checkbox" th:field="*{part}" th:value="${p}">
                    <span th:text="${p}"></span>
                </label>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">활동 숙련도</label>
            <select th:field="*{skillLevel}" class="form-select">
                <option value="">숙련도를 선택해주세요</option>
                <option th:each="level : ${T(com.encore.encore.domain.member.entity.SkillLevel).values()}"
                        th:value="${level.name()}" th:text="${level.name()}"></option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">활동 선호 지역</label>
            <select th:field="*{activityArea}" id="activityArea" class="form-select">
                <option value="">지역을 선택해주세요</option>
                <optgroup label="특별시/자치시">
                    <option value="서울특별시">서울특별시</option>
                    <option value="세종특별자치시">세종특별자치시</option>
                </optgroup>
                <optgroup label="광역시">
                    <option value="인천광역시">인천광역시</option>
                    <option value="대전광역시">대전광역시</option>
                    <option value="대구광역시">대구광역시</option>
                    <option value="광주광역시">광주광역시</option>
                    <option value="울산광역시">울산광역시</option>
                    <option value="부산광역시">부산광역시</option>
                </optgroup>
                <optgroup label="도 단위 (남/북)">
                    <option value="경기도">경기도</option>
                    <option value="강원특별자치도">강원특별자치도</option>
                    <option value="충청북도">충청북도</option>
                    <option value="충청남도">충청남도</option>
                    <option value="전라북도">전라북도</option>
                    <option value="전라남도">전라남도</option>
                    <option value="경상북도">경상북도</option>
                    <option value="경상남도">경상남도</option>
                    <option value="제주특별자치도">제주특별자치도</option>
                </optgroup>
            </select>
        </div>

        <div class="section-title">주요 활동 장르</div>
        <div class="checkbox-grid">
            <label th:each="cat : ${categoryOptions}" class="check-item">
                <input type="checkbox" th:field="*{categories}" th:value="${cat}">
                <span th:text="${cat}"></span>
            </label>
        </div>

        <div class="mt-5">
            <label class="form-label fw-bold">아티스트 소개</label>
            <textarea th:field="*{description}" class="form-control" rows="5"
                      placeholder="팬들에게 보여줄 멋진 소개글을 작성해주세요."></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-save">아티스트 프로필 저장</button>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/feed}" class="btn-home-link">
            <i class="bi bi-house"></i> 나중에 하기 (홈으로)
        </a>
    </div>
</div>

</body>
</html>
