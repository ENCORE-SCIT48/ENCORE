    <!DOCTYPE html>
    <html lang="ko" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>호스트 설정 - Encore</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" th:href="@{/css/profile/host-setup.css}">
        <script defer th:src="@{/js/profile/host-setup.js}"></script>
    </head>
    <body><div class="setup-container">
        <header class="text-center mb-4 position-relative">
            <a th:href="@{/mypage}" class="position-absolute start-0 top-0 btn btn-link text-decoration-none p-0">← 마이페이지</a>
            <h2 class="fw-bold">호스트 프로필 설정</h2>
            <p class="text-muted small">필수 정보를 입력하여 인증을 완료해주세요.</p>
        </header>

        <form id="hostSetupForm" th:action="@{/hostprofile/setup}" th:object="${profile}" method="post" enctype="multipart/form-data">

            <div class="profile-upload">
                <img id="preview" th:src="${profile.profileImageUrl != null && profile.profileImageUrl != '' ? profile.profileImageUrl : '/image/default-profile.png'}" class="profile-img">
                <label for="fileInput" class="upload-badge">
                    <i class="bi bi-camera-fill"></i>
                </label>
                <input type="file" id="fileInput" name="profileImage" accept="image/*" style="display:none">
            </div>

            <div class="section-title">사업자 인증</div>
            <div class="mb-3">
                <label class="form-label fw-bold small">사업자 번호</label>
                <div class="input-group">
                    <input type="text" th:field="*{businessNumber}" id="businessNumber" class="form-control" placeholder="000-00-00000">
                    <button type="button" id="btnCheckBiz" class="btn btn-dark">조회/인증</button>
                </div>
                <div th:if="${profile.verified}" id="verificationBadge" class="text-success small fw-bold mt-2">
                    <i class="bi bi-patch-check-fill"></i> 인증된 사업자입니다.
                </div>
            </div>

            <input type="hidden" th:field="*{verified}">

            <div class="section-title">단체 상세 정보</div>
            <div class="mb-3">
                <label class="form-label fw-bold small">단체명(법인명)</label>
                <input type="text" th:field="*{organizationName}" class="form-control" placeholder="회사명 입력">
            </div>

            <div class="row">
                <div class="col-6 mb-3">
                    <label class="form-label fw-bold small">대표자명</label>
                    <input type="text" th:field="*{representativeName}" class="form-control">
                </div>
                <div class="col-6 mb-3">
                    <label class="form-label fw-bold small">개업일자</label>
                    <input type="text"
                           th:field="*{openingDate}"
                           id="openingDate"
                           class="form-control"
                           placeholder="YYYYMMDD"
                           maxlength="8"
                           inputmode="numeric"> </div>
            </div>

            <div class="section-title">비즈니스 연락처</div>
            <div class="mb-3">
                <label class="form-label fw-bold small">대표 연락처</label>
                <input type="text" th:field="*{contactNumber}" id="contactNumber" class="form-control" placeholder="010-0000-0000">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold small">업무용 이메일</label>
                <input type="email" th:field="*{businessEmail}" class="form-control" placeholder="email@business.com">
            </div>

            <button type="submit" class="btn btn-save">호스트 프로필 저장</button>

            <div class="text-center mt-4 d-flex justify-content-center gap-3">
                <a th:href="@{/mypage}" class="btn-home-link">마이페이지로</a>
                <a th:href="@{/feed}" class="btn-home-link">나중에 하기</a>
            </div>

            <input type="hidden" th:field="*{verified}">
        </form>
    </div>
    </body>
    </html>
