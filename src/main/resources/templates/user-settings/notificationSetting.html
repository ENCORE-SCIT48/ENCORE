<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알림 설정</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/user-settings/notification.css">
</head>

<body>

<div class="settings-container">
    <header class="settings-header">
        <button class="back-btn" th:onclick="'location.href=\'@{/mypage}\' '">
            <i class="bi bi-arrow-left"></i>
        </button>
        <h1 class="header-title">알림 설정</h1>
    </header>

    <main class="settings-content">
        <div class="setting-item">
            <span class="setting-label">공연 시작 알림 설정</span>
            <div class="form-check form-switch">
                <input class="form-check-input custom-switch" type="checkbox" role="switch" id="perfStartNoti"
                       checked>
            </div>
        </div>

        <div class="setting-item">
            <span class="setting-label">DM 알림 설정</span>
            <div class="form-check form-switch">
                <input class="form-check-input custom-switch" type="checkbox" role="switch" id="dmNoti">
            </div>
        </div>
    </main>
</div>

<script src="/js/user-settings/notificationSetting.js"></script>
</body>

</html>
