<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Encore - 로그인</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
        />
        <link rel="stylesheet" th:href="@{/css/auth/login.css}" />
        <script defer th:src="@{/js/auth/login.js}"></script>
    </head>

    <body>
        <div class="container d-flex justify-content-center">
            <div class="login-container w-100">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h3 class="text-center fw-bold mb-4">로그인</h3>

                        <div
                            th:if="${message}"
                            class="alert alert-success border-0 small mb-3"
                            role="alert"
                        >
                            <i class="bi bi-check-circle-fill me-1"></i>
                            <span th:text="${message}">가입을 축하합니다!</span>
                        </div>

                        <div
                            th:if="${param.error}"
                            class="alert alert-danger border-0 small mb-3"
                            role="alert"
                        >
                            <i class="bi bi-exclamation-triangle-fill me-1"></i>
                            이메일 또는 비밀번호가 일치하지 않습니다.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label
                                    for="email"
                                    class="form-label small fw-semibold"
                                    >이메일</label
                                >
                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    name="email"
                                    placeholder="example@encore.com"
                                    required
                                    autofocus
                                />
                            </div>

                            <div class="mb-3">
                                <label
                                    for="password"
                                    class="form-label small fw-semibold"
                                    >비밀번호</label
                                >
                                <input
                                    type="password"
                                    class="form-control"
                                    id="password"
                                    name="password"
                                    placeholder="비밀번호를 입력하세요"
                                    required
                                />
                            </div>

                            <div
                                class="d-flex justify-content-between align-items-center mb-4"
                            >
                                <div class="form-check">
                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        id="rememberMe"
                                        name="remember-me"
                                    />
                                    <label
                                        class="form-check-label small"
                                        for="rememberMe"
                                        >아이디 저장</label
                                    >
                                </div>
                            </div>

                            <button
                                type="submit"
                                class="btn btn-primary w-100 py-2 fw-bold"
                            >
                                로그인
                            </button>
                        </form>

                        <hr class="my-4 text-muted" />

                        <div class="text-center small">
                            <span class="text-muted"
                                >아직 계정이 없으신가요?</span
                            >
                            <a
                                th:href="@{/auth/join}"
                                class="text-decoration-none fw-bold ms-1"
                                style="color: #e63946"
                                >회원가입</a
                            >
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a
                        th:href="@{/}"
                        class="text-decoration-none text-muted small"
                    >
                        <i class="bi bi-house-door"></i> 메인으로 돌아가기
                    </a>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
