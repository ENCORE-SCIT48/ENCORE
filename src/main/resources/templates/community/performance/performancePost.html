<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연 모집글</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performancePost.js}"></script>

  <style>
    body {
      background: #e5e5e5;
      margin: 0;
      padding-bottom: 80px;
    }

    .app-container {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      padding: 16px;
      position: relative;
    }

    .page-title {
      font-size: 18px;
      font-weight: bold;
      margin-top: 16px;
    }

    .tab-buttons {
      display: flex;
      gap: 12px;
      margin: 60px 0 24px;
    }

    .tab-buttons button {
      flex: 1;
      padding: 10px 0;
      border-radius: 24px;
      border: 1px solid #000;
      background: #fff;
      font-weight: 500;
    }

    .tab-buttons .active {
      background: #000;
      color: #fff;
    }

    .post-card {
      background: #d9d9d9;
      padding: 18px 16px;
      margin-bottom: 18px;
      cursor: pointer;
      border-radius: 10px;
    }

    .post-title {
      font-weight: bold;
      font-size: 16px;
    }

    .post-content {
      font-size: 13px;
      margin-top: 6px;
      color: #555;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .post-meta {
      font-size: 12px;
      margin-top: 8px;
      color: #444;
      display: flex;
      justify-content: space-between;
    }

    .write-btn {
      text-align: right;
      margin-top: 28px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="app-container">

    <!-- 상단 타이틀 -->
    <div class="page-title">공연 모집글</div>

    <!-- 프로필 -->
    <div th:replace="~{fragments/profile :: profile('/my-info')}"></div>

    <!-- 탭 -->
    <div class="tab-buttons">
      <button th:onclick="|location.href='@{/posts/performer}'|">공연자 모집</button>
      <button class="active">공연 모집</button>
    </div>

    <!-- 게시글 리스트 -->
    <div th:each="post : ${posts}" class="post-card"
      th:onclick="|location.href='@{/posts/performance/{id}(id=${post.postId})}'|">

      <!-- 제목 -->
      <div class="post-title" th:text="${post.title}">제목</div>

      <!-- 내용 미리보기 -->
      <div class="post-content" th:text="${post.content}">
        게시글 내용 미리보기
      </div>

      <!-- 조회수 / 작성일 -->
      <div class="post-meta">
        <span th:text="'조회수 ' + ${post.viewCount}">조회수 0</span>
        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">
          2026-01-01
        </span>
      </div>

    </div>

    <!-- 데이터 없을 때 -->
    <div th:if="${#lists.isEmpty(posts)}" style="text-align:center; margin-top:40px; color:#777;">
      등록된 게시글이 없습니다.
    </div>

    <!-- 글 작성 -->
    <div class="write-btn">
      <a th:href="@{/posts/performance/write}">글 작성</a>
    </div>

  </div>

  <!-- 하단 네비 -->
  <div th:replace="~{fragments/footer :: footer(
      ${ {
          {label:'모집글', href:'/posts'},
          {label:'공연장리스트', href:'/venueList'},
          {label:'홈', href:'/'},
          {label:'DM', href:'/directMessage'},
          {label:'채팅방', href:'/chat'}
      } }
  )}"></div>

</body>

</html>
