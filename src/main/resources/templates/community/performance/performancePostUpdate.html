<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연 모집글 수정</title>

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/theme.css}" />
  <link rel="stylesheet" th:href="@{/css/community/app-encore.css}">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performancePost.js}"></script>
</head>

<body>

  <div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbarPerformer}"></div>

    <div class="app-container">

      <!-- 상단 -->
      <div class="top-bar">
        <a th:href="@{/posts/performance/{id}(id=${post.postId})}" class="back-btn">←</a>
        <div class="page-title">공연 모집글 수정</div>
        <div></div>
      </div>

      <!-- hidden id -->
      <input type="hidden" id="postId" th:value="${post.postId}">

      <!-- 공연장 선택 -->
      <div style="margin-bottom:15px;">
        <label class="label-small d-block">공연장 선택</label>

        <select name="venueId" class="form-control" required>
          <option value="">공연장을 선택하세요</option>

          <option th:each="venue : ${venues}" th:value="${venue.venueId}" th:text="${venue.venueName}"
            th:selected="${venue.venueId == post.venueId}">
          </option>

        </select>
      </div>

      <!-- 제목 -->
      <input type="text" name="title" class="post-title-input" th:value="${post.title}" required>

      <div class="divider"></div>

      <!-- 정원 -->
      <div style="margin-bottom:15px;">
        <label class="label-small d-block">모집 정원</label>
        <input type="number" name="capacity" min="1" class="form-control" th:value="${post.capacity}" required>
      </div>

      <!-- 내용 -->
      <textarea name="content" class="post-content-textarea" required th:text="${post.content}"></textarea>

      <!-- 버튼 -->
      <div class="btn-group">

        <button id="updateBtn" type="button" class="btn btn-primary">
          수정 완료
        </button>

        <a th:href="@{/posts/performance/{id}(id=${post.postId})}" class="btn btn-outline-secondary">
          취소
        </a>

      </div>

    </div>

    <!-- 하단 네비 -->
    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
