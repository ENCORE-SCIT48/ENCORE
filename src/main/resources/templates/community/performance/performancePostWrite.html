<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연 모집글 작성</title>

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/theme.css}" />
  <link rel="stylesheet" th:href="@{/css/common/forms.css}">
  <link rel="stylesheet" th:href="@{/css/community/app-encore.css}">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performancePost.js}"></script>
</head>

<body>

  <div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbarPerformer}"></div>

    <div class="app-container">

      <!-- 상단 -->
      <div class="top-bar">
        <a id="backBtn" th:href="@{/posts/performance}" class="back-btn">←</a>
        <div class="page-title">공연 모집글 작성</div>
        <div></div>
      </div>

      <!-- 입력 폼 -->
      <form id="postForm">

        <!-- 공연장 선택 -->
        <div class="form-group-encore">
          <label class="form-label-secondary d-block">공연장 선택</label>
          <select name="venueId" class="form-control" required>
            <option value="">공연장을 선택하세요</option>
            <option th:each="venue : ${venues}" th:value="${venue.venueId}" th:text="${venue.venueName}">
            </option>
          </select>
        </div>

        <input type="text" name="title" class="post-title-input" placeholder="제목을 입력하세요" required>

        <div class="divider"></div>

        <div class="form-group-encore">
          <label class="form-label-secondary d-block">모집 정원</label>
          <input type="number" name="capacity" min="1" class="form-control" placeholder="모집 인원을 입력하세요" required>
        </div>

        <textarea name="content" class="post-content-textarea" placeholder="내용을 입력하세요" required></textarea>

        <div class="btn-group">

          <button type="button" id="submitBtn" class="btn btn-primary">
            등록
          </button>

          <a th:href="@{/posts/performance}" class="btn btn-outline-secondary">
            취소
          </a>

        </div>

      </form>

    </div>

    <!-- 하단 네비 -->
    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
