<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연 모집글 작성</title>

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performancePost.js}"></script>

  <style>
    body {
      margin: 0;
      background: #ffffff;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: #ffffff;
    }

    .app-container {
      padding: 20px 16px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .back-btn {
      font-size: 20px;
      text-decoration: none;
      color: #333333;
      cursor: pointer;
    }

    .page-title {
      font-size: 16px;
      font-weight: 600;
      color: #333333;
    }

    .post-title-input {
      font-size: 18px;
      font-weight: 600;
      width: 100%;
      border: none;
      outline: none;
      padding: 10px 0;
      color: #333333;
    }

    .divider {
      margin: 20px 0;
      border-top: 1px solid #eee;
    }

    .post-content-textarea {
      font-size: 14px;
      line-height: 1.8;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      min-height: 300px;
      color: #333333;
    }

    .btn-group {
      margin-top: 30px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn-group button,
    .btn-group a {
      width: 100px;
      font-size: 13px;
    }

    .btn-primary {
      background-color: #E63946;
      border-color: #E63946;
    }

    .btn-primary:hover {
      background-color: #c92f3a;
      border-color: #c92f3a;
    }

    .btn-outline-secondary {
      color: #333333;
      border-color: #ccc;
    }

    .btn-outline-secondary:hover {
      background-color: #f5f5f5;
    }
  </style>

</head>

<body>

  <div class="app-wrapper">

    <div class="app-container">

      <!-- 상단 -->
      <div class="top-bar">
        <a id="backBtn" th:href="@{/posts/performance}" class="back-btn">←</a>
        <div class="page-title">공연 모집글 작성</div>
        <div th:replace="~{fragments/performer/profile :: profile}"></div>
      </div>

      <!-- 입력 폼 -->
      <form id="postForm">

        <input type="text" name="title" class="post-title-input" placeholder="제목을 입력하세요" required>

        <div class="divider"></div>

        <div style="margin-bottom:15px;">
          <label style="font-size:13px; color:#666;">모집 정원</label>
          <input type="number" name="capacity" min="1" class="form-control" placeholder="모집 인원을 입력하세요" required>
        </div>

        <textarea name="content" class="post-content-textarea" placeholder="내용을 입력하세요" required></textarea>

        <div class="btn-group">

          <button type="button" id="submitBtn" class="btn btn-primary">
            등록
          </button>

          <a th:href="@{/posts/performance}" class="btn btn-outline-secondary">
            취소
          </a>

        </div>

      </form>

    </div>

    <!-- 하단 네비 -->
    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
