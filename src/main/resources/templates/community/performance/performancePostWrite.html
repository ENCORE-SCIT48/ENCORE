<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연 모집글 작성</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performancePost.js}"></script>

  <style>
    body {
      background: #e5e5e5;
      margin: 0;
      padding-bottom: 80px;
    }

    .app-container {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      padding: 16px;
      position: relative;
    }

    .top-bar {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .back-btn {
      font-size: 18px;
      cursor: pointer;
      margin-right: 12px;
      text-decoration: none;
      color: #000;
    }

    .page-title {
      font-size: 18px;
      font-weight: bold;
    }

    .post-title-input {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
      width: 100%;
      border: none;
      outline: none;
    }

    .divider {
      margin: 16px 0;
      border-top: 1px solid #ddd;
    }

    .post-content-textarea {
      font-size: 16px;
      line-height: 1.8;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      min-height: 300px;
    }

    .btn-group {
      margin-top: 30px;
      display: flex;
      justify-content: space-between;
    }

    .btn-group button,
    .btn-group a {
      width: 48%;
    }
  </style>
</head>

<body>

  <div class="app-container">

    <div class="top-bar">
      <a id="backBtn" class="back-btn">←</a>
      <div class="page-title">공연 모집글 작성</div>
      <div th:replace="~{fragments/profile :: profile('/my-info')}"></div>
    </div>

    <!-- 제목 -->
    <input type="text" name="title" class="post-title-input" placeholder="제목을 입력하세요" required>

    <div class="divider"></div>

    <!-- 내용 -->
    <textarea name="content" class="post-content-textarea" placeholder="내용을 입력하세요" required></textarea>

    <!-- 버튼 -->
    <div class="btn-group">
      <button id="submitBtn" class="btn btn-dark">
        등록
      </button>

      <a href="/posts/performance" class="btn btn-outline-secondary">
        취소
      </a>
    </div>
  </div>

  <!-- 하단 네비 -->
  <div th:replace="~{fragments/footer :: footer(
    ${ {
        {label:'모집글', href:'/posts'},
        {label:'공연장리스트', href:'/venueList'},
        {label:'홈', href:'/'},
        {label:'DM', href:'/directMessage'},
        {label:'채팅방', href:'/chat'}
    } }
  )}"></div>

</body>

</html>
