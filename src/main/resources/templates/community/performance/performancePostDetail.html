<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연 모집글 상세</title>

  <!-- Bootswatch Litera -->
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performancePost.js}"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    .app-container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 60px 20px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .back-btn {
      font-size: 22px;
      text-decoration: none;
      color: #333333;
      transition: 0.2s;
    }

    .back-btn:hover {
      color: #E63946;
    }

    .page-title {
      font-size: 22px;
      font-weight: 600;
      color: #333333;
    }

    .post-title {
      font-size: 30px;
      font-weight: 600;
      margin-top: 10px;
      color: #333333;
    }

    .post-meta {
      font-size: 14px;
      color: #666;
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
    }

    .divider {
      margin: 30px 0;
      border-top: 1px solid #eee;
    }

    .post-content {
      font-size: 17px;
      line-height: 2;
      white-space: pre-line;
      min-height: 400px;
      color: #333333;
    }

    .btn-group {
      margin-top: 60px;
      display: flex;
      gap: 20px;
      justify-content: flex-end;
    }

    .btn-group button {
      width: 140px;
    }

    .btn-primary {
      background-color: #E63946;
      border-color: #E63946;
    }

    .btn-primary:hover {
      background-color: #c92f3a;
      border-color: #c92f3a;
    }

    .btn-outline-danger {
      color: #E63946;
      border-color: #E63946;
    }

    .btn-outline-danger:hover {
      background-color: #E63946;
      color: #fff;
    }

    :root {
      --bs-primary: #E63946;
      --bs-primary-rgb: 230, 57, 70;
    }
  </style>

</head>

<body>

  <div class="app-container" th:data-post-id="${post.postId}">

    <!-- 상단 바 -->
    <div class="top-bar">
      <a th:href="@{/posts/performance}" class="back-btn">
        ←
      </a>
      <div class="page-title">공연 모집글</div>
      <div th:replace="~{fragments/profile :: profile('/my-info')}"></div>
    </div>

    <!-- 제목 -->
    <div class="post-title" th:text="${post.title}">
      제목
    </div>

    <!-- 조회수 / 작성일 -->
    <div class="post-meta">
      <span th:text="'조회수 ' + ${post.viewCount}">조회수 0</span>
      <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">
        2026-01-01
      </span>
    </div>

    <div class="divider"></div>

    <!-- 내용 -->
    <div class="post-content" th:text="${post.content}">
      게시글 내용
    </div>

    <!-- 버튼 -->
    <div class="btn-group">

      <button id="editBtn" class="btn btn-primary">
        수정
      </button>

      <button id="deleteBtn" class="btn btn-outline-danger">
        삭제
      </button>

    </div>

  </div>

  <!-- 하단 네비 -->
  <div th:replace="~{fragments/footer :: footer(
      ${ {
          {label:'모집글', href:'/posts/performance'},
          {label:'공연장리스트', href:'/venueList'},
          {label:'홈', href:'/'},
          {label:'DM', href:'/directMessage'},
          {label:'채팅방', href:'/chat'}
      } }
  )}"></div>

</body>

</html>
