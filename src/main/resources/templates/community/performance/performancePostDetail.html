<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연 모집글 상세</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #e5e5e5;
      margin: 0;
      padding-bottom: 80px;
    }

    .app-container {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      padding: 16px;
      position: relative;
    }

    .top-bar {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .back-btn {
      font-size: 18px;
      cursor: pointer;
      margin-right: 12px;
      text-decoration: none;
      color: #000;
    }

    .page-title {
      font-size: 18px;
      font-weight: bold;
    }

    .post-title {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    .post-meta {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
    }

    .divider {
      margin: 16px 0;
      border-top: 1px solid #ddd;
    }

    .post-content {
      font-size: 16px;
      line-height: 1.8;
      white-space: pre-line;
      min-height: 300px;
    }

    .btn-group {
      margin-top: 30px;
      display: flex;
      justify-content: space-between;
    }

    .btn-group a {
      width: 48%;
    }
  </style>
</head>

<body>

  <div class="app-container">

    <!-- 상단 바 -->
    <div class="top-bar">
      <a th:href="@{/posts/performance}" class="back-btn">
        ←
      </a>
      <div class="page-title">공연 모집글</div>
      <div th:replace="~{fragments/profile :: profile('/my-info')}"></div>
    </div>

    <!-- 제목 -->
    <div class="post-title" th:text="${post.title}">
      제목
    </div>

    <!-- 조회수 / 작성일 -->
    <div class="post-meta">
      <span th:text="'조회수 ' + ${post.viewCount}">조회수 0</span>
      <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">
        2026-01-01
      </span>
    </div>

    <div class="divider"></div>

    <!-- 내용 크게 -->
    <div class="post-content" th:text="${post.content}">
      게시글 내용
    </div>

    <!-- 버튼 -->
    <div class="btn-group">
      <a th:href="@{/posts/performance/{id}/edit(id=${post.postId})}" class="btn btn-dark">
        수정
      </a>

      <a th:href="@{/posts/performance}" class="btn btn-outline-secondary">
        목록
      </a>
    </div>

    <!-- 하단 네비 -->
    <div th:replace="~{fragments/footer :: footer(
      ${ {
          {label:'모집글', href:'/posts'},
          {label:'공연장리스트', href:'/venueList'},
          {label:'홈', href:'/'},
          {label:'DM', href:'/directMessage'},
          {label:'채팅방', href:'/chat'}
      } }
    )}"></div>

  </div>



</body>

</html>
