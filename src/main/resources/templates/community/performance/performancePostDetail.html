<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연 모집글 상세</title>

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performancePost.js}"></script>

  <style>
    body {
      margin: 0;
      background: #ffffff;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: #ffffff;
    }

    .app-container {
      padding: 20px 16px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .back-btn {
      font-size: 20px;
      text-decoration: none;
      color: #333333;
    }

    .page-title {
      font-size: 16px;
      font-weight: 600;
      color: #333333;
    }

    .post-title {
      font-size: 20px;
      font-weight: 600;
      margin-top: 10px;
      color: #333333;
    }

    .post-meta {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
    }

    .divider {
      margin: 20px 0;
      border-top: 1px solid #eee;
    }

    .post-content {
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-line;
      color: #333333;
    }

    .btn-group {
      margin-top: 40px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-group button {
      width: 100px;
      font-size: 13px;
    }

    .btn-primary {
      background-color: #E63946;
      border-color: #E63946;
    }

    .btn-primary:hover {
      background-color: #c92f3a;
      border-color: #c92f3a;
    }

    .btn-outline-danger {
      color: #E63946;
      border-color: #E63946;
    }

    .btn-outline-danger:hover {
      background-color: #E63946;
      color: #fff;
    }
  </style>

</head>

<body>

  <div class="app-wrapper">

    <div class="app-container" th:data-post-id="${post.postId}">

      <!-- 상단 -->
      <div class="top-bar">
        <a th:href="@{/posts/performance}" class="back-btn">←</a>
        <div class="page-title">공연 모집글</div>
        <div th:replace="~{fragments/performer/profile :: profile}"></div>
      </div>

      <!-- 내용 -->
      <div class="post-title" th:text="${post.title}">제목</div>

      <div class="post-meta">
        <span th:text="'조회수 ' + ${post.viewCount}"></span>
        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
      </div>

      <div class="divider"></div>

      <div class="post-content" th:text="${post.content}">
        게시글 내용
      </div>

      <div class="btn-group">
        <button id="editBtn" class="btn btn-primary">수정</button>
        <button id="deleteBtn" class="btn btn-outline-danger">삭제</button>
      </div>

    </div>

    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
