<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연 모집글 상세</title>

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performancePost.js}"></script>

  <style>
    body {
      margin: 0;
      background: #ffffff;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: #ffffff;
    }

    .app-container {
      padding: 20px 16px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .back-btn {
      font-size: 20px;
      text-decoration: none;
      color: #333333;
    }

    .page-title {
      font-size: 16px;
      font-weight: 600;
      color: #333333;
    }

    .post-title {
      font-size: 20px;
      font-weight: 600;
      margin-top: 10px;
      color: #333333;
    }

    .post-meta {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
    }

    .divider {
      margin: 20px 0;
      border-top: 1px solid #eee;
    }

    .post-content {
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-line;
      color: #333333;
    }

    .btn-group {
      margin-top: 40px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-group button {
      width: 100px;
      font-size: 13px;
    }

    .btn-primary {
      background-color: #E63946;
      border-color: #E63946;
    }

    .btn-primary:hover {
      background-color: #c92f3a;
      border-color: #c92f3a;
    }

    .btn-outline-danger {
      color: #E63946;
      border-color: #E63946;
    }

    .btn-outline-danger:hover {
      background-color: #E63946;
      color: #fff;
    }
  </style>
</head>

<body>

  <div class="app-wrapper">

    <div class="app-container" th:data-post-id="${post.postId}">

      <!-- 상단 -->
      <div class="top-bar">
        <a th:href="@{/posts/performance}" class="back-btn">←</a>
        <div class="page-title">공연 모집글</div>
        <div th:replace="~{fragments/performer/profile :: profile}"></div>
      </div>

      <!-- 제목 -->
      <div class="post-title" th:text="${post.title}">제목</div>

      <!-- 조회수 / 작성일 -->
      <div class="post-meta">
        <span th:text="'조회수 ' + ${post.viewCount}"></span>
        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
      </div>

      <!-- 모집 인원 + 마감 표시 -->
      <div style="margin-top:6px; font-size:12px;">

        <!-- 정원 있는 경우 -->
        <span th:if="${post.capacity != null}">

          <!-- 마감 여부 판단 -->
          <span th:if="${post.approvedCount >= post.capacity}" style="color:#E63946; font-weight:600;">
            모집 마감
          </span>

          <span th:if="${post.approvedCount < post.capacity}" style="color:#E63946;">
            모집 인원
            <span th:text="${post.approvedCount}"></span>
            /
            <span th:text="${post.capacity}"></span>
          </span>

        </span>

        <!-- 정원 제한 없음 -->
        <span th:if="${post.capacity == null}" style="color:#666;">
          모집 인원 제한 없음
        </span>

      </div>

      <div class="divider"></div>

      <!-- 공연장 정보 -->
      <div style="font-size:13px; margin-bottom:15px;">

        <div style="font-weight:600; margin-bottom:6px;">
          공연 정보
        </div>

        <div th:unless="${post.venueImage != null and post.venueImage != ''}" style="width:100%; height:200px; display:flex; align-items:center; justify-content:center;
            background:#f1f3f5; border-radius:8px; margin-top:10px; color:#999; font-size:14px;">
          이미지 없음
        </div>

        <div>
          <b>공연장</b> :
          <span th:text="${post.venueName}"></span>
        </div>

        <div>
          <b>위치</b> :
          <span th:text="${post.venueAddress}"></span>
        </div>

        <div>
          <b>유형</b> :
          <span th:text="${post.venueType}"></span>
        </div>


      </div>

      <div class="divider"></div>



      <!-- 내용 -->
      <div class="post-content" th:text="${post.content}">
        게시글 내용
      </div>

      <!-- 버튼 영역 -->
      <div class="btn-group">

        <!-- 작성자 (공연자 본인) -->
        <th:block th:if="${profileMode == 'ROLE_PERFORMER'
            and activeAuthorId != null 
            and post.performerId != null 
            and activeAuthorId == post.performerId}">

          <button id="editBtn" class="btn btn-primary"
            th:onclick="|location.href='@{/posts/performance/{id}/edit(id=${post.postId})}'|">
            수정
          </button>

          <button id="deleteBtn" class="btn btn-outline-danger">
            삭제
          </button>

        </th:block>

        <!-- 공연자이면서 작성자가 아닌 경우 -->
        <th:block th:if="${profileMode == 'ROLE_PERFORMER'
      and activeAuthorId != null
      and activeAuthorId != post.performerId}">

          <!-- 마감 -->
          <button th:if="${post.capacity != null 
        and post.approvedCount >= post.capacity}" class="btn btn-secondary" disabled>
            모집마감
          </button>

          <!-- 신청완료 -->
          <button th:if="${(post.capacity == null 
        or post.approvedCount < post.capacity) 
        and alreadyApplied}" class="btn btn-secondary" disabled>
            신청완료
          </button>

          <!-- 신청 -->
          <button th:if="${(post.capacity == null 
        or post.approvedCount < post.capacity) 
        and !alreadyApplied}" id="applyBtn" class="btn btn-primary">
            신청
          </button>

        </th:block>

      </div>

    </div>

    <!-- 하단 네비 -->
    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
