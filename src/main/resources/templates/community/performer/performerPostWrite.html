<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연자 파티 모집글 작성</title>

  <style>
    body {
      background: #e5e5e5;
      margin: 0;
      padding-bottom: 80px;
    }

    .app-container {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      padding: 16px;
      position: relative;
    }

    /* 상단 */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-top: 16px;
    }

    .back-btn {
      position: absolute;
      left: 0;
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    .profile {
      position: absolute;
      top: 0;
      right: 0;
      width: 36px;
      height: 36px;
      background: #ddd;
      border-radius: 50%;
    }

    /* 제목 카드 */
    .title-card {
      background: #d9d9d9;
      margin: 80px 0 12px;
      padding: 16px;
    }

    .title-card input {
      width: 100%;
      border: none;
      background: transparent;
      outline: none;
      text-align: center;
      font-size: 15px;
      font-weight: bold;
    }

    /* 내용 카드 */
    .content-card {
      background: #d9d9d9;
      padding: 16px;
      min-height: 220px;
    }

    .content-card textarea {
      width: 100%;
      height: 180px;
      border: none;
      background: transparent;
      resize: none;
      outline: none;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }

    /* 정보 카드 */
    .info-card {
      background: #d9d9d9;
      padding: 16px;
      margin: 12px 0;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
    }

    /* 등록 버튼 */
    .submit-wrapper {
      text-align: right;
      margin-top: 16px;
    }

    .submit-btn {
      background: #d9d9d9;
      border: none;
      padding: 6px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    /* 하단 네비 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #d9d9d9;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
    }

    .bottom-nav div {
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="app-container">

    <!-- 상단 -->
    <div class="top-bar">
      <button class="back-btn" onclick="history.back()">뒤로</button>
      <div th:replace="~{fragments/profile :: profile('/my-info')}"></div>
    </div>

    <!-- 글 작성 form -->
    <form th:action="@{/posts}" method="post">

      <!-- 제목 입력 -->
      <div class="title-card">
        <input
          type="text"
          name="title"
          placeholder="공연자 파티 모집글 제목"
          required
        >
      </div>

      <!-- 내용 입력 -->
      <div class="content-card">
        <textarea
          name="content"
          placeholder="공연자 파티 모집글 내용을 작성하세요"
          required
        ></textarea>
      </div>

      <!-- 공연 정보 -->
      <div class="info-card">
        공연 정보
      </div>

      <!-- 공연장 정보 -->
      <div class="info-card">
        공연장 정보
      </div>

      <!-- 등록 버튼 -->
      <div class="submit-wrapper">
        <button type="submit" class="submit-btn">등록</button>
      </div>

    </form>

  </div>

  <!-- 하단 네비 -->
  <div th:replace="~{fragments/footer :: footer(
      ${ {
          {label:'모집글', href:'/posts'},
          {label:'공연장리스트', href:'/venueList'},
          {label:'홈', href:'/'},
          {label:'DM', href:'/deirectMessage'},
          {label:'채팅방', href:'/chat'}
      } }
  )}"></div>

</body>
</html>
