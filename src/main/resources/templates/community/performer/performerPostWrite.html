<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연자 파티 모집글 작성</title>

  <style>
    body {
      background: #e5e5e5;
      margin: 0;
      padding-bottom: 80px;
    }

    .app-container {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      padding: 16px;
      position: relative;
    }

    .back-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }


    .title-card {
      background: #d9d9d9;
      margin: 80px 0 12px;
      padding: 16px;
    }

    .title-card input {
      width: 100%;
      border: none;
      background: transparent;
      outline: none;
      text-align: center;
      font-size: 15px;
      font-weight: bold;
    }

    .content-card {
      background: #d9d9d9;
      padding: 16px;
      min-height: 220px;
    }

    .content-card textarea {
      width: 100%;
      height: 180px;
      border: none;
      background: transparent;
      resize: none;
      outline: none;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }

    .info-card {
      background: #d9d9d9;
      padding: 16px;
      margin: 12px 0;
      text-align: center;
      font-size: 14px;
    }

    .submit-wrapper {
      text-align: right;
      margin-top: 16px;
    }

    .submit-btn {
      background: #d9d9d9;
      border: none;
      padding: 6px 16px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performerPost.js}"></script>
</head>

<body>

  <div class="app-container">

    <!-- 뒤로가기 -->
    <button class="back-btn" id="backBtn">←</button>

    <!-- 프로필 -->
    <div th:replace="~{fragments/profile :: profile('/my-info')}"></div>

    <!-- 글 작성 -->
    <form id="postForm">

      <!-- 제목 -->
      <div class="title-card">
        <input type="text" name="title" placeholder="공연자 파티 모집글 제목">
      </div>

      <!-- 내용 -->
      <div class="content-card">
        <textarea name="content" placeholder="공연자 파티 모집글 내용을 작성하세요"></textarea>
      </div>

      <!-- 공연 정보 -->
      <div class="info-card">공연 정보</div>

      <!-- 공연장 정보 -->
      <div class="info-card">공연장 정보</div>

      <!-- 등록 버튼 -->
      <div class="submit-wrapper">
        <button type="button" class="submit-btn" id="submitBtn">등록</button>
      </div>

    </form>

  </div>

  <!-- footer -->
  <div th:replace="~{fragments/footer :: footer(
    ${ {
        {label:'모집글', href:'/posts'},
        {label:'공연장리스트', href:'/venueList'},
        {label:'홈', href:'/'},
        {label:'DM', href:'/directMessage'},
        {label:'채팅방', href:'/chat'}
    } }
  )}"></div>



</body>

</html>
