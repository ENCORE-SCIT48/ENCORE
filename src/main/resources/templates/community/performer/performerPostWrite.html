<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연자 모집글 작성</title>

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/theme.css}" />
  <link rel="stylesheet" th:href="@{/css/community/app-encore.css}">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performerPost.js}"></script>
</head>

<body>

  <div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbarPerformer}"></div>

    <div class="app-container">

      <!-- 상단 -->
      <div class="top-bar">
        <a id="backBtn" class="back-btn">←</a>
        <div class="page-title">공연자 모집글 작성</div>
        <div></div>
      </div>

      <!-- 입력 폼 -->
      <form id="postForm">

        <input type="text" name="title" class="post-title-input" placeholder="제목을 입력하세요" required>

        <div class="divider"></div>

        <div style="margin-bottom:15px;">
          <label class="label-small d-block">모집 정원</label>
          <input type="number" name="capacity" min="1" class="form-control" placeholder="모집 인원을 입력하세요" required>
        </div>

        <div class="divider"></div>

        <!-- 모집 장르 -->
        <div style="margin-bottom:15px;">
          <label class="label-small d-block">모집 장르</label>
          <div style="margin-top:6px;">
            <label style="margin-right:10px;">
              <input type="checkbox" name="recruitCategory" value="BUSKING"> 버스킹
            </label>
            <label style="margin-right:10px;">
              <input type="checkbox" name="recruitCategory" value="BAND"> 밴드
            </label>
            <label style="margin-right:10px;">
              <input type="checkbox" name="recruitCategory" value="DANCE"> 댄스
            </label>
            <label>
              <input type="checkbox" name="recruitCategory" value="CLASSIC"> 클래식
            </label>
            <label>
              <input type="checkbox" name="recruitCategory" value="GUKACK"> 국악
            </label>
            <label>
              <input type="checkbox" name="recruitCategory" value="MASIC"> 마술/퍼포먼스
            </label>
          </div>
        </div>

        <!-- 모집 파트 -->
        <div style="margin-bottom:15px;">
          <label class="label-small d-block">포지션</label>
          <div style="margin-top:6px;">
            <label style="margin-right:10px;">
              <input type="checkbox" name="recruitPart" value="VOCAL"> 보컬
            </label>
            <label style="margin-right:10px;">
              <input type="checkbox" name="recruitPart" value="GUITAR"> 기타
            </label>
            <label style="margin-right:10px;">
              <input type="checkbox" name="recruitPart" value="DRUM"> 드럼
            </label>
            <label>
              <input type="checkbox" name="recruitPart" value="BASS"> 베이스
            </label>
            <label>
              <input type="checkbox" name="recruitPart" value="KEYBOARD"> 키보드
            </label>
            <label>
              <input type="checkbox" name="recruitPart" value="DANCER"> 댄서
            </label>
            <label>
              <input type="checkbox" name="recruitPart" value="EXTRA"> 기타악기
            </label>
          </div>
        </div>

        <!-- 모집 지역 -->
        <div style="margin-bottom:15px;">
          <label class="label-small d-block">모집 지역</label>
          <input type="text" name="recruitArea" class="form-control" placeholder="예: 서울, 부산" required>
        </div>

        <textarea name="content" class="post-content-textarea" placeholder="내용을 입력하세요" required></textarea>

        <div class="btn-group">
          <button type="button" id="submitBtn" class="btn btn-primary">
            등록
          </button>

          <a th:href="@{/posts/performer}" class="btn btn-outline-secondary">
            취소
          </a>
        </div>

      </form>

    </div>

    <!-- 하단 네비 -->
    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
