<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연자 모집글 작성</title>

  <!-- Bootswatch Litera -->
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performerPost.js}"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    .app-container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 60px 20px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .back-btn {
      font-size: 22px;
      text-decoration: none;
      color: #333333;
      transition: 0.2s;
    }

    .back-btn:hover {
      color: #E63946;
    }

    .page-title {
      font-size: 22px;
      font-weight: 600;
      color: #333333;
    }

    .post-title-input {
      font-size: 28px;
      font-weight: 600;
      width: 100%;
      border: none;
      outline: none;
      padding: 10px 0;
      color: #333333;
    }

    .divider {
      margin: 30px 0;
      border-top: 1px solid #eee;
    }

    .post-content-textarea {
      font-size: 17px;
      line-height: 2;
      width: 100%;
      border: none;
      outline: none;
      resize: vertical;
      min-height: 400px;
      color: #333333;
    }

    .btn-group {
      margin-top: 60px;
      display: flex;
      justify-content: flex-end;
      gap: 20px;
    }

    .btn-group button,
    .btn-group a {
      width: 160px;
    }

    .btn-primary {
      background-color: #E63946;
      border-color: #E63946;
    }

    .btn-primary:hover {
      background-color: #c92f3a;
      border-color: #c92f3a;
    }

    .btn-outline-secondary {
      color: #333333;
      border-color: #ccc;
    }

    .btn-outline-secondary:hover {
      background-color: #f5f5f5;
    }

    :root {
      --bs-primary: #E63946;
      --bs-primary-rgb: 230, 57, 70;
    }
  </style>

</head>

<body>

  <div class="app-container">

    <!-- 상단 바 -->
    <div class="top-bar">
      <a id="backBtn" class="back-btn">←</a>
      <div class="page-title">공연자 모집글 작성</div>
      <div th:replace="~{fragments/profile :: profile('/my-info')}"></div>
    </div>

    <form id="postForm">

      <!-- 제목 -->
      <input type="text" name="title" class="post-title-input" placeholder="제목을 입력하세요" required>

      <div class="divider"></div>

      <!-- 내용 -->
      <textarea name="content" class="post-content-textarea" placeholder="내용을 입력하세요" required></textarea>

      <!-- 버튼 -->
      <div class="btn-group">
        <button type="button" id="submitBtn" class="btn btn-primary">
          등록
        </button>

        <a th:href="@{/posts/performer}" class="btn btn-outline-secondary">
          취소
        </a>
      </div>

    </form>

  </div>

  <!-- 하단 네비 -->
  <div th:replace="~{fragments/footer :: footer(
      ${ {
          {label:'모집글', href:'/posts/performer'},
          {label:'공연장리스트', href:'/venueList'},
          {label:'홈', href:'/'},
          {label:'DM', href:'/directMessage'},
          {label:'채팅방', href:'/chat'}
      } }
    )}"></div>

</body>

</html>
