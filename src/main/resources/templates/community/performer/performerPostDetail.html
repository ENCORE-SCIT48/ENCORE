<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>공연자 파티 모집 상세</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #e5e5e5;
      margin: 0;
      padding-bottom: 80px;
    }

    .app-container {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      padding: 16px;
      position: relative;
    }

    .back-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .main-card {
      background: #d9d9d9;
      margin: 80px 0 24px;
      padding: 20px 16px;
      text-align: center;
      min-height: 280px;
    }

    .main-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .main-content {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .btn-wrapper {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .action-btn {
      background: #d9d9d9;
      border: none;
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performerPost.js}"></script>
</head>

<body>

  <div class="app-container" th:data-post-id="${post.postId}">

    <!-- 뒤로가기 -->
    <button class="back-btn" id="backBtn">←</button>

    <!-- 프로필 -->
    <div th:replace="~{fragments/profile :: profile('/my-info')}"></div>

    <!-- 메인 카드 -->
    <div class="main-card">
      <div class="main-title" th:text="${post.title}"></div>
      <div class="main-content" th:text="${post.content}"></div>
    </div>

    <!-- 수정 / 삭제 버튼 -->
    <div class="btn-wrapper">
      <button class="action-btn" id="editBtn">수정</button>
      <button class="action-btn" id="deleteBtn">삭제</button>
    </div>

    <!-- footer -->
    <div th:replace="~{fragments/footer :: footer(
      ${ {
          {label:'모집글', href:'/posts'},
          {label:'공연장리스트', href:'/venueList'},
          {label:'홈', href:'/'},
          {label:'DM', href:'/directMessage'},
          {label:'채팅방', href:'/chat'}
      } }
    )}"></div>

  </div>

  

</body>

</html>
