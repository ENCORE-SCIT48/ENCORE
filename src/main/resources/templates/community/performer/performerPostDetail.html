<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연자 모집글 상세</title>

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/theme.css}" />
  <link rel="stylesheet" th:href="@{/css/community/app-encore.css}">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performerPost.js}"></script>
</head>

<body>

  <div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbarPerformer}"></div>

    <div class="app-container" th:data-post-id="${post.postId}">

      <!-- 상단 -->
      <div class="top-bar">
        <a th:href="@{/posts/performer}" class="back-btn">←</a>
        <div class="page-title">공연자 모집글</div>
        <div></div>
      </div>

      <!-- 제목 -->
      <div class="post-title lg" th:text="${post.title}">제목</div>

      <!-- 조회수 / 작성일 -->
      <div class="post-meta">
        <span th:text="'조회수 ' + ${post.viewCount}"></span>
        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
      </div>

      <!-- 모집 인원 + 마감 표시 -->
      <div style="margin-top:6px; font-size:12px;">

        <!-- 정원 있는 경우 -->
        <span th:if="${post.capacity != null}">

          <!-- 마감 여부 판단 -->
          <span th:if="${post.approvedCount >= post.capacity}" class="text-encore-primary" style="font-weight:600;">
            모집 마감
          </span>

          <span th:if="${post.approvedCount < post.capacity}" class="text-encore-primary">
            모집 인원
            <span th:text="${post.approvedCount}"></span>
            /
            <span th:text="${post.capacity}"></span>
          </span>

        </span>

        <!-- 정원 제한 없음 -->
        <span th:if="${post.capacity == null}" class="text-encore-muted">
          모집 인원 제한 없음
        </span>

      </div>

      <div class="divider"></div>

      <!-- 모집 조건 -->
      <div style="margin-bottom:15px; font-size:13px;">

        <div>
          <b>모집 장르</b> :

          <th:block th:if="${post.recruitCategory != null}">
            <span th:each="cat : ${#strings.arraySplit(post.recruitCategory, ',')}"
              style="background:#f5f5f5; padding:4px 8px; border-radius:12px; margin-right:5px;">
              <span th:text="${cat == 'BUSKING' ? '버스킹' :
                    cat == 'BAND' ? '밴드' :
                    cat == 'DANCE' ? '댄스' :
                    cat == 'CLASSIC' ? '클래식' :
                    cat == 'GUKACK' ? '국악' :
                    cat == 'MASIC' ? '마술/퍼포먼스' :
                    cat}">
              </span>
            </span>
          </th:block>

        </div>

        <div style="margin-top:6px;">
          <b>모집 포지션</b> :

          <th:block th:if="${post.recruitPart != null}">
            <span th:each="part : ${#strings.arraySplit(post.recruitPart, ',')}"
              style="background:#f5f5f5; padding:4px 8px; border-radius:12px; margin-right:5px;">
              <span th:text="${part == 'VOCAL' ? '보컬' :
                    part == 'GUITAR' ? '기타' :
                    part == 'DRUM' ? '드럼' :
                    part == 'BASS' ? '베이스' :
                    part == 'KEYBOARD' ? '키보드' :
                    part == 'DANCER' ? '댄서' :
                    part == 'EXTRA' ? '기타악기' :
                    part}">
              </span>
            </span>
          </th:block>

        </div>

        <div style="margin-top:6px;">
          <b>모집 지역</b> :
          <span th:text="${post.recruitArea}"></span>
        </div>

      </div>

      <div class="divider"></div>

      <!-- 내용 -->
      <div class="post-content pre-line" th:text="${post.content}">
        게시글 내용
      </div>

      <!-- 버튼 영역 -->
      <div class="btn-group">

        <!-- 작성자 (공연자 본인) -->
        <th:block th:if="${profileMode == 'ROLE_PERFORMER'
      and activeAuthorId != null 
      and post.performerId != null 
      and activeAuthorId == post.performerId}">

          <button id="editBtn" class="btn btn-primary"
            th:onclick="|location.href='@{/posts/performer/{id}/edit(id=${post.postId})}'|">
            수정
          </button>

          <button id="deleteBtn" class="btn btn-outline-danger">
            삭제
          </button>

        </th:block>

        <!-- 공연자이면서 작성자가 아닌 경우 -->
        <th:block th:if="${profileMode == 'ROLE_PERFORMER'
      and activeAuthorId != null
      and activeAuthorId != post.performerId}">

          <!-- 마감 -->
          <button th:if="${post.capacity != null 
        and post.approvedCount >= post.capacity}" class="btn btn-secondary" disabled>
            모집마감
          </button>

          <!-- 신청완료 -->
          <button th:if="${(post.capacity == null 
        or post.approvedCount < post.capacity) 
        and alreadyApplied}" class="btn btn-secondary" disabled>
            신청완료
          </button>

          <!-- 신청 -->
          <button th:if="${(post.capacity == null 
        or post.approvedCount < post.capacity) 
        and !alreadyApplied}" id="applyBtn" class="btn btn-primary">
            신청
          </button>

        </th:block>

      </div>



    </div>

    <!-- 하단 네비 -->
    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
