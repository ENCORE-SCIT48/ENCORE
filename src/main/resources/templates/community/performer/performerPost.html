<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연자 모집글</title>

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/theme.css}" />
  <link rel="stylesheet" th:href="@{/css/common/forms.css}">
  <link rel="stylesheet" th:href="@{/css/community/app-encore.css}">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performerPost.js}"></script>
</head>

<body>

  <div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbarPerformer}"></div>

    <div class="app-container">

      <div class="top-header">
        <div class="page-title">공연자 모집글</div>
        <div></div>
      </div>
      
      <div class="tab-buttons">
        <button class="active">공연자 모집</button>
        <button th:onclick="|location.href='@{/posts/performance}'|">공연 모집</button>
      </div>

      <form th:action="@{/posts/performer}" method="get" class="search-form d-flex gap-2">
        <input type="text" name="keyword" class="form-control search-input" placeholder="검색" th:value="${keyword}">
        <button type="submit" class="btn btn-primary btn-sm">
          검색
        </button>
      </form>

      <div th:each="post : ${posts}" class="post-card"
        th:onclick="|location.href='@{/posts/performer/{id}(id=${post.postId})}'|">

        <div class="post-title" th:text="${post.title}"></div>

        <div class="post-content" th:text="${post.content}"></div>

        <!-- 모집 인원 + 마감 표시 -->
        <div class="small mt-1">

          <!-- 정원 있는 경우 -->
          <span th:if="${post.capacity != null}">

            <!-- 마감 여부 판단 -->
            <span th:if="${post.approvedCount >= post.capacity}" class="text-capacity-full">
              모집 마감
            </span>

            <span th:if="${post.approvedCount < post.capacity}" class="text-capacity-available">
              모집 인원
              <span th:text="${post.approvedCount}"></span>
              /
              <span th:text="${post.capacity}"></span>
            </span>

          </span>

          <!-- 정원 제한 없음 -->
          <span th:if="${post.capacity == null}" class="text-muted-secondary">
            모집 인원 제한 없음
          </span>

        </div>

        <div class="post-meta">
          <span th:text="'조회수 ' + ${post.viewCount}"></span>
          <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}"></span>
        </div>

      </div>

      <div th:if="${#lists.isEmpty(posts)}" class="empty-state-encore small">
        등록된 게시글이 없습니다.
      </div>

      <!-- 페이징 -->
      <nav th:if="${page.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">

          <th:block th:with="
            groupStart=${(page.number / 5) * 5},
            groupEnd=${T(java.lang.Math).min(groupStart + 4, page.totalPages - 1)}
          ">

            <li class="page-item" th:classappend="${groupStart == 0} ? 'disabled'">
              <a class="page-link" th:href="@{/posts/performer(page=${groupStart - 5}, keyword=${keyword})}">
                << </a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(groupStart, groupEnd)}"
              th:classappend="${i == page.number} ? 'active'">
              <a class="page-link" th:text="${i + 1}" th:href="@{/posts/performer(page=${i}, keyword=${keyword})}">
              </a>
            </li>

            <li class="page-item" th:classappend="${groupEnd + 1 >= page.totalPages} ? 'disabled'">
              <a class="page-link" th:href="@{/posts/performer(page=${groupStart + 5}, keyword=${keyword})}">
                >>
              </a>
            </li>

          </th:block>

        </ul>
      </nav>

      <div class="write-btn">
        <a th:href="@{/posts/performer/write}">글 작성</a>
      </div>

    </div>

    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
