<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연자 모집글</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performerPost.js}"></script>

  <style>
    body {
      background: #e5e5e5;
      margin: 0;
      padding-bottom: 80px;
    }

    .app-container {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      padding: 16px;
      position: relative;
    }

    .profile {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      background: #ddd;
      border-radius: 50%;
    }

    .tab-buttons {
      display: flex;
      gap: 12px;
      margin: 80px 0 24px;
    }

    .tab-buttons button {
      flex: 1;
      padding: 10px 0;
      border-radius: 24px;
      border: 1px solid #000;
      background: #fff;
    }

    .tab-buttons .active {
      background: #000;
      color: #fff;
    }

    .post-card {
      background: #ddd;
      padding: 16px;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .post-title {
      font-weight: bold;
      text-align: center;
    }

    .post-sub {
      text-align: center;
      font-size: 14px;
      margin-top: 4px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .post-tag {
      font-size: 12px;
      margin-top: 8px;
    }

    .write-btn {
      text-align: right;
      margin-top: 24px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #d9d9d9;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
    }

    .bottom-nav div {
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="app-container">

    <!-- 프로필 -->
    <div th:replace="~{fragments/profile :: profile('/my-info')}"></div>


    <!-- 탭 -->
    <div class="tab-buttons">
      <button class="active">공연자 모집</button>
      <button th:onclick="|location.href='@{/posts/performance}'|">공연 모집</button>
    </div>

    <!-- 게시글 리스트 -->
    <div th:each="post : ${posts}" class="post-card" th:onclick="|location.href='@{/posts/performer/{id}(id=${post.postId})}'|">

      <div class="post-title" th:text="${post.title}">제목</div>
      <div class="post-sub" th:text="${post.content}">공연자 모집 글</div>
    </div>

    <!-- 글 작성 -->
    <div class="write-btn">
      <a th:href="@{/posts/performer/write}">글 작성</a>
    </div>


    <!-- 하단 네비 -->
    <div th:replace="~{fragments/footer :: footer(
      ${ {
          {label:'모집글', href:'/posts'},
          {label:'공연장리스트', href:'/venueList'},
          {label:'홈', href:'/'},
          {label:'DM', href:'/deirectMessage'},
          {label:'채팅방', href:'/chat'}
      } }
  )}"></div>

  </div>



</body>

</html>
