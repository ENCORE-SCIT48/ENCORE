<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연자 모집글</title>

  <!-- Bootswatch Litera -->
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performerPost.js}"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    .app-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 60px 20px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 600;
      color: #333333;
      margin-bottom: 24px;
    }

    /* 탭 */
    .tab-buttons {
      display: flex;
      gap: 20px;
      margin: 40px 0 32px;
    }

    .tab-buttons button {
      padding: 12px 30px;
      border-radius: 30px;
      border: 1px solid #E63946;
      background: #fff;
      font-weight: 500;
      color: #E63946;
      transition: 0.2s;
    }

    .tab-buttons .active {
      background: #E63946;
      color: #fff;
    }

    /* 카드 */
    .post-card {
      background: #ffffff;
      border: 1px solid #eee;
      padding: 24px;
      margin-bottom: 22px;
      cursor: pointer;
      border-radius: 12px;
      transition: 0.2s;
    }

    .post-card:hover {
      border-color: #E63946;
      box-shadow: 0 6px 18px rgba(230, 57, 70, 0.12);
    }

    .post-title {
      font-weight: 600;
      font-size: 18px;
      color: #333333;
    }

    .post-content {
      font-size: 15px;
      margin-top: 8px;
      color: #666;
    }

    .post-meta {
      font-size: 13px;
      margin-top: 14px;
      color: #333333;
      display: flex;
      justify-content: space-between;
    }

    .write-btn {
      text-align: right;
      margin-top: 40px;
    }

    .write-btn a {
      color: #E63946;
      font-weight: 600;
      text-decoration: none;
    }

    .write-btn a:hover {
      text-decoration: underline;
    }

    /* 검색 영역 */
    .search-form {
      width: 100%;
      max-width: 800px;
    }

    .search-input {
      height: 48px;
      font-size: 16px;
      margin-right: 12px;
    }

    .search-button {
      width: 130px;
      height: 48px;
    }

    :root {
      --bs-primary: #E63946;
      --bs-primary-rgb: 230, 57, 70;
    }

    .btn-primary {
      background-color: #E63946;
      border-color: #E63946;
    }

    .btn-primary:hover {
      background-color: #c92f3a;
      border-color: #c92f3a;
    }
  </style>

</head>

<body>

  <div class="app-container">

    <div class="page-title">공연자 모집글</div>

    <div th:replace="~{fragments/performer/profile :: profile}"></div>

    <div class="tab-buttons">
      <button class="active">공연자 모집</button>
      <button th:onclick="|location.href='@{/posts/performance}'|">공연 모집</button>
    </div>

    <form th:action="@{/posts/performer}" method="get" class="search-form d-flex mb-4">
      <input type="text" name="keyword" class="form-control search-input" placeholder="검색하세요" th:value="${keyword}">
      <button type="submit" class="btn btn-primary search-button">
        Search
      </button>
    </form>

    <div th:each="post : ${posts}" class="post-card"
      th:onclick="|location.href='@{/posts/performer/{id}(id=${post.postId})}'|">

      <div class="post-title" th:text="${post.title}">제목</div>

      <div class="post-content" th:text="${post.content}">
        게시글 내용 미리보기
      </div>

      <div class="post-meta">
        <span th:text="'조회수 ' + ${post.viewCount}">조회수 0</span>
        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">
          2026-01-01
        </span>
      </div>

    </div>

    <div th:if="${#lists.isEmpty(posts)}" style="text-align:center; margin-top:40px; color:#999;">
      등록된 게시글이 없습니다.
    </div>

    <!-- 페이징 영역 -->
    <nav th:if="${page.totalPages > 1}" class="mt-5">
      <ul class="pagination justify-content-center">

        <!-- 그룹 시작 계산 -->
        <th:block th:with="
        groupStart=${(page.number / 5) * 5},
        groupEnd=${T(java.lang.Math).min(groupStart + 4, page.totalPages - 1)}
    ">

          <!-- 이전 그룹 -->
          <li class="page-item" th:classappend="${groupStart == 0} ? 'disabled'">
            <a class="page-link" th:href="@{/posts/performer(
              page=${groupStart - 5},
              keyword=${keyword}
            )}">
              << </a>
          </li>

          <!-- 번호 5개 -->
          <li class="page-item" th:each="i : ${#numbers.sequence(groupStart, groupEnd)}"
            th:classappend="${i == page.number} ? 'active'">

            <a class="page-link" th:text="${i + 1}" th:href="@{/posts/performer(page=${i}, keyword=${keyword})}">
            </a>

          </li>

          <!-- 다음 그룹 -->
          <li class="page-item" th:classappend="${groupEnd + 1 >= page.totalPages} ? 'disabled'">
            <a class="page-link" th:href="@{/posts/performer(
              page=${groupStart + 5},
              keyword=${keyword}
            )}">
              >>
            </a>
          </li>

        </th:block>

      </ul>
    </nav>




    <div class="write-btn">
      <a th:href="@{/posts/performer/write}">글 작성</a>
    </div>

  </div>

  <!-- 하단 네비 -->
  <div th:replace="~{fragments/performer/footer :: footer}"></div>

</body>

</html>
