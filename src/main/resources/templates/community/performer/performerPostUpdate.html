<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공연자 모집글 수정</title>

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/theme.css}" />
  <link rel="stylesheet" th:href="@{/css/community/app-encore.css}">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/community/performerPost.js}"></script>
</head>

<body>

  <div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbarPerformer}"></div>

    <div class="app-container">

      <!-- 상단 -->
      <div class="top-bar">
        <a th:href="@{/posts/performer/{id}(id=${post.postId})}" class="back-btn">←</a>
        <div class="page-title">공연자 모집글 수정</div>
        <div></div>
      </div>

      <!-- 내용 -->
      <input type="hidden" id="postId" th:value="${post.postId}">

      <div class="divider"></div>

      <input type="text" name="title" class="post-title-input" th:value="${post.title}" required>

      <div class="divider"></div>

      <!-- 모집 조건 -->
      <div style="margin-bottom:15px; font-size:13px;">

        <div style="font-weight:600; margin-bottom:6px;">
          모집 조건
        </div>

        <!-- 모집 장르 -->
        <div style="margin-bottom:10px;">
          <label class="label-small">모집 장르</label><br>

          <label th:each="genre : ${T(java.util.List).of('BUSKING','BAND','DANCE','CLASSIC','GUKACK','MASIC')}" 
                style="margin-right:10px;">
            <input type="checkbox" 
                  name="recruitCategory" 
                  th:value="${genre}" 
                  th:checked="${post.recruitCategory != null 
              and #strings.contains(post.recruitCategory, genre)}">
            <span th:text="${genre}"></span>
          </label>
        </div>

        <!-- 모집 파트 -->
        <div style="margin-bottom:10px;">
          <label class="label-small">모집 포지션</label><br>

          <label th:each="part : ${T(java.util.List).of('VOCAL','GUITAR','DRUM','BASS','KEYBOARD','DANCER','EXTRA')}"
            style="margin-right:10px;">
            <input type="checkbox" 
                    name="recruitPart" 
                    th:value="${part}" 
                    th:checked="${post.recruitPart != null 
              and #strings.contains(post.recruitPart, part)}">
            <span th:text="${part}"></span>
          </label>
        </div>

        <!-- 모집 지역 -->
        <div>
          <label class="label-small">모집 지역</label>
          <input type="text" name="recruitArea" class="form-control" th:value="${post.recruitArea}">
        </div>

      </div>

      <div class="divider"></div>


      <!-- 정원 -->
      <div style="margin-bottom:15px;">
        <label class="label-small d-block">모집 정원</label>
        <input type="number" name="capacity" min="1" class="form-control" th:value="${post.capacity}" required>
      </div>

      <textarea name="content" class="post-content-textarea" required th:text="${post.content}"></textarea>

      <div class="btn-group">
        <button id="updateBtn" type="button" class="btn btn-primary">
          수정 완료
        </button>

        <a th:href="@{/posts/performer/{id}(id=${post.postId})}" class="btn btn-outline-secondary">
          취소
        </a>
      </div>

    </div>

    <!-- 하단 고정 네비 -->
    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
