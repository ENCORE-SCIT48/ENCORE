<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>공연자 파티 모집글 수정</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #e5e5e5;
      margin: 0;
      padding-bottom: 80px;
    }

    .app-container {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      padding: 16px;
      position: relative;
    }

    /* 상단 */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-top: 16px;
    }

    .back-btn {
      position: absolute;
      left: 0;
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    /* 메인 카드 */
    .main-card {
      background: #d9d9d9;
      margin: 80px 0 24px;
      padding: 20px 16px;
      text-align: center;
      min-height: 280px;
    }

    .title-input {
      width: 100%;
      border: none;
      background: transparent;
      outline: none;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .content-textarea {
      width: 100%;
      height: 180px;
      border: none;
      background: transparent;
      resize: none;
      outline: none;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }

    /* 버튼 */
    .btn-wrapper {
      text-align: right;
      margin-top: 16px;
    }

    .action-btn {
      background: #d9d9d9;
      border: none;
      padding: 6px 16px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- 공통 JS -->
  <script th:src="@{/js/community/performerPost.js}"></script>

</head>

<body>

  <div class="app-container">

    <!-- 상단 -->
    <div class="top-bar">
      <button class="back-btn" onclick="history.back()">뒤로</button>
      <div th:replace="~{fragments/profile :: profile('/my-info')}"></div>
    </div>

    <!-- 수정 카드 -->
    <div class="main-card">

      <!-- 제목 -->
      <input type="text" name="title" class="title-input" th:value="${post.title}" placeholder="모집글 제목">

      <!-- 내용 -->
      <textarea name="content" class="content-textarea" placeholder="모집글 내용을 입력하세요"
        th:text="${post.content}"></textarea>

    </div>

    <!-- 수정 완료 버튼 -->
    <div class="btn-wrapper">
      <button type="button" class="action-btn" id="updateBtn">수정 완료</button>
    </div>

    <!-- postId 전달 -->
    <input type="hidden" id="postId" th:value="${post.postId}">

    <!-- footer -->
    <div th:replace="~{fragments/footer :: footer(
    ${ {
        {label:'모집글', href:'/posts'},
        {label:'홈', href:'/'},
        {label:'마이', href:'/mypage'}
    } }
  )}"></div>

  </div>


</body>

</html>
