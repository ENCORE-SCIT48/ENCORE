<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내가 신청한 공연자 모집글</title>

  <!-- Bootswatch Litera -->
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #ffffff;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: #ffffff;
      min-height: 100vh;
    }

    .app-container {
      padding: 20px 16px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .back-btn {
      font-size: 20px;
      text-decoration: none;
      color: #333333;
    }

    .page-title {
      font-size: 16px;
      font-weight: 600;
      color: #333333;
    }

    .content-area {
      margin-top: 10px;
      min-height: 300px;
      font-size: 14px;
      color: #999;
      text-align: center;
    }

    .divider {
      margin: 20px 0;
      border-top: 1px solid #eee;
    }

    .btn-primary {
      background-color: #E63946;
      border-color: #E63946;
    }

    .btn-primary:hover {
      background-color: #c92f3a;
      border-color: #c92f3a;
    }
  </style>
</head>

<body>

  <div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbarPerformer}"></div>

    <div class="app-container">

      <!-- 상단 바 -->
      <div class="top-bar">
        <a th:href="@{/mypage}" class="back-btn">←</a>
        <div class="page-title">내가 신청한 공연자 모집글</div>
        <div></div>
      </div>

      <div class="divider"></div>

      <!-- 내용 영역 -->
      <div class="content-area" style="text-align:left; color:#333;">

        <!-- 목록 없을 때 -->
        <div th:if="${#lists.isEmpty(posts)}" style="text-align:center; padding:40px 0; color:#999;">
          신청한 공연자 모집글이 없습니다.
        </div>

        <!-- 목록 있을 때 -->
        <div th:each="post : ${posts}" style="border:1px solid #eee;
              padding:14px;
              border-radius:10px;
              margin-bottom:14px;
              background:#fff;">

          <!-- 제목 -->
          <div style="font-weight:600; margin-bottom:8px;">
            <a th:href="@{/posts/performer/{postId}(postId=${post.postId})}" style="text-decoration:none; color:#333;"
              th:text="${post.title}">
              게시글 제목
            </a>
          </div>

          <!-- 정보 영역 -->
          <div style="font-size:12px; color:#666;">
            <!-- 모집 인원 + 마감 표시 -->
            <div style="margin-top:6px; font-size:12px;">

              <!-- 정원 있는 경우 -->
              <span th:if="${post.capacity != null}">

                <!-- 마감 여부 판단 -->
                <span th:if="${post.approvedCount >= post.capacity}" style="color:#E63946; font-weight:600;">
                  모집 마감
                </span>

                <span th:if="${post.approvedCount < post.capacity}" style="color:#E63946;">
                  모집 인원
                  <span th:text="${post.approvedCount}"></span>
                  /
                  <span th:text="${post.capacity}"></span>
                </span>

              </span>

              <!-- 정원 제한 없음 -->
              <span th:if="${post.capacity == null}" style="color:#666;">
                모집 인원 제한 없음
              </span>

            </div>
            조회수 :
            <span th:text="${post.viewCount}">0</span>
          </div>

          <!-- 작성일 -->
          <div style="font-size:12px; color:#999; margin-top:6px;"
            th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">
            작성일
          </div>

        </div>

      </div>

    </div>

    <!-- 하단 네비 -->
    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
