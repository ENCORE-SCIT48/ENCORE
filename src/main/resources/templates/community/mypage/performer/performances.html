<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내가 작성한 공연 모집글</title>

  <!-- Bootswatch Litera -->
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/theme.css}" />
  <link rel="stylesheet" th:href="@{/css/community/app-encore.css}">
</head>

<body>

  <div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbarPerformer}"></div>

    <div class="app-container">

      <!-- 상단 바 -->
      <div class="top-bar">
        <a th:href="@{/mypage}" class="back-btn">←</a>
        <div class="page-title">내가 작성한 공연 모집글</div>
        <div></div>
      </div>

      <div class="divider"></div>

      <!-- 내용 영역 -->
      <div class="content-area">

        <div th:if="${page.totalElements == 0}">
          작성한 공연 모집글이 없습니다.
        </div>

        <div th:each="post : ${page.content}"
          class="card-inner">

          <div style="font-weight:600; margin-bottom:6px;">
            <a th:href="@{/posts/performance/{postId}(postId=${post.postId})}" class="link-encore"
              th:text="${post.title}">
              게시글 제목
            </a>
          </div>

          <div class="meta-small">
            <!-- 모집 인원 + 마감 표시 -->
            <div style="margin-top:6px; font-size:12px;">

              <!-- 정원 있는 경우 -->
              <span th:if="${post.capacity != null}">

                <!-- 마감 여부 판단 -->
                <span th:if="${post.approvedCount >= post.capacity}" class="text-encore-primary" style="font-weight:600;">
                  모집 마감
                </span>

                <span th:if="${post.approvedCount < post.capacity}" class="text-encore-primary">
                  모집 인원
                  <span th:text="${post.approvedCount}"></span>
                  /
                  <span th:text="${post.capacity}"></span>
                </span>

              </span>

              <!-- 정원 제한 없음 -->
              <span th:if="${post.capacity == null}" class="text-encore-muted">
                모집 인원 제한 없음
              </span>

            </div>
            조회수 :
            <span th:text="${post.viewCount}">0</span>
          </div>

          <div style="font-size:12px; color:#999; margin-top:4px;"
            th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">
            작성일
          </div>

        </div>

      </div>

    </div>

    <!-- 하단 네비 -->
    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
