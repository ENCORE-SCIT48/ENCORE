<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신청자 관리</title>

  <!-- Bootswatch Litera -->
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #ffffff;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: #ffffff;
      min-height: 100vh;
    }

    .app-container {
      padding: 20px 16px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .back-btn {
      font-size: 20px;
      text-decoration: none;
      color: #333333;
    }

    .page-title {
      font-size: 16px;
      font-weight: 600;
      color: #333333;
    }

    .content-area {
      margin-top: 10px;
      min-height: 300px;
      font-size: 14px;
      color: #333;
    }

    .divider {
      margin: 20px 0;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>

  <div class="app-wrapper">

    <div class="app-container">

      <!-- 상단 바 -->
      <div class="top-bar">
        <a th:href="@{/mypage/performer/manage}" class="back-btn">←</a>
        <div class="page-title">신청자 관리</div>
        <div th:replace="~{fragments/performer/profile :: profile}"></div>
      </div>

      <div class="divider"></div>

      <!-- 내용 영역 -->
      <div class="content-area" style="text-align:left;">

        <!-- 게시글이 없는 경우 -->
        <div th:if="${#lists.isEmpty(posts)}">
          작성한 공연 모집글이 없습니다.
        </div>

        <!-- 게시글 반복 -->
        <div th:each="item : ${posts}"
          style="border:1px solid #eee; padding:14px; border-radius:12px; margin-bottom:18px;">

          <!-- 공연 제목 -->
          <div style="font-weight:600; font-size:15px; margin-bottom:10px;">
            <span th:text="${item.post.title}">공연 제목</span>
          </div>

          <!-- 신청자 목록이 없는 경우 -->
          <div th:if="${#lists.isEmpty(item.applicants)}" style="font-size:13px; color:#999;">
            신청자가 없습니다.
          </div>

          <!-- 신청자 목록 반복 -->
          <div th:each="applicant : ${item.applicants}" style="display:flex; justify-content:space-between; align-items:center;
            padding:10px 0; border-top:1px solid #f0f0f0;">

            <!-- 신청자 정보 -->
            <div>
              신청자:
              <span th:text="${applicant.applicantPerformer.user.email}"></span>
            </div>

            <!-- 상태 + 버튼 영역 -->
            <div style="text-align:right;">

              <!-- PENDING -->
              <div th:if="${applicant.status == 'PENDING'}">

                <span style="color:#ff9800; font-weight:600; margin-right:10px;">
                  대기중
                </span>

                <a th:href="@{/mypage/performer/manage/performance/approve(
                          postId=${item.post.postId},
                          interactionId=${applicant.interactionId})}" class="btn btn-sm btn-success"
                  style="margin-right:5px;">
                  승인
                </a>

                <a th:href="@{/mypage/performer/manage/performance/reject(
                          postId=${item.post.postId},
                          interactionId=${applicant.interactionId})}" class="btn btn-sm btn-danger">
                  거절
                </a>

              </div>

              <!-- APPROVED -->
              <div th:if="${applicant.status == 'APPROVED'}" style="color:#2e7d32; font-weight:600;">
                승인됨
              </div>

              <!-- REJECTED -->
              <div th:if="${applicant.status == 'REJECTED'}" style="color:#E63946; font-weight:600;">
                거절됨
              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- 하단 네비 -->
    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
