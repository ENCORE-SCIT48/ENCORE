<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지</title>

  <!-- Bootswatch Litera -->
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #ffffff;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: #ffffff;
      min-height: 100vh;
    }

    .app-container {
      padding: 20px 16px 100px 16px;
    }

    /* ===== 상단 ===== */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .top-left,
    .top-center,
    .top-right {
      flex: 1;
    }

    .top-center {
      text-align: center;
    }

    .top-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .back-btn {
      font-size: 20px;
      text-decoration: none;
      color: #333333;
    }

    .page-title {
      font-size: 16px;
      font-weight: 600;
      color: #333333;
    }

    /* ===== 프로필 ===== */
    .profile-section {
      text-align: center;
      margin-top: 20px;
      margin-bottom: 40px;
    }

    .profile-image {
      width: 100px;
      height: 100px;
      background: #e5e5e5;
      border-radius: 50%;
      margin: 0 auto 16px auto;
    }

    .nickname {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #333333;
    }

    .follow-info {
      display: flex;
      justify-content: center;
      gap: 40px;
      font-size: 13px;
      color: #666;
    }

    /* ===== 섹션 제목 ===== */
    .section-title {
      margin-top: 30px;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #E63946;
    }

    /* ===== 메뉴 ===== */
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .menu-item {
      background: #f8f8f8;
      padding: 14px;
      text-align: center;
      border-radius: 10px;
      font-size: 14px;
      text-decoration: none;
      color: #333;
      border: 1px solid #eee;
      transition: 0.2s;
    }

    .menu-item:hover {
      border-color: #E63946;
      box-shadow: 0 4px 16px rgba(230, 57, 70, 0.1);
      color: #E63946;
    }

    .logout-btn {
      width: 100%;
      background: #f8f8f8;
      border: 1px solid #eee;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="app-wrapper">

    <div class="app-container">

      <!-- ===== 상단 ===== -->
      <div class="top-bar">
        <div class="top-left">
          <a th:href="@{/}" class="back-btn">←</a>
        </div>
        <div class="top-center">
          <div class="page-title">마이페이지</div>
        </div>
        <div class="top-right">
          <div th:replace="~{fragments/performer/profile :: profile}"></div>
        </div>
      </div>

      <!-- ===== 프로필 영역 ===== -->
      <div class="profile-section">

        <div class="profile-image"></div>

        <div class="nickname">
          <span sec:authentication="name">닉네임</span>
        </div>

        <div class="follow-info">

          <a th:href="@{/user/follow(targetId=${loginProfileId}, tab='following', profileMode=${profileMode})}"
            class="follow-btn">
            팔로잉
          </a>

          <a th:href="@{/user/follow(targetId=${loginProfileId}, tab='follower', profileMode=${profileMode})}"
            class="follow-btn">
            팔로워
          </a>

        </div>

      </div>

      <!-- ===== 공통 설정 ===== -->
      <div class="section-title">공통 설정</div>
      <div class="menu-list">
        <a href="#" class="menu-item">회원정보 수정</a>
        <a th:href="@{/user/notification}" class="menu-item">알림 설정</a>
        <a th:href="@{/user/block}" class="menu-item">차단 목록 관리</a>
        <form th:action="@{/logout}" method="post" style="margin:0;">
          <button type="submit" class="menu-item logout-btn">
            로그아웃
          </button>
        </form>
      </div>

      <!-- ===== 공연자 전용 ===== -->
      <div th:if="${profileMode == 'ROLE_PERFORMER'}">

        <div class="section-title">공연자 설정</div>
        <div class="menu-list">

          <a th:href="@{/performerprofile/setup}" class="menu-item">프로필 수정</a>

          <a th:href="@{/mypage/performer/posts}" class="menu-item">
            내가 작성한 공연자 모집글
          </a>

          <a th:href="@{/mypage/performer/performances}" class="menu-item">
            내가 작성한 공연 모집글
          </a>

          <a th:href="@{/mypage/performer/applied-posts}" class="menu-item">
            내가 신청한 공연자 모집글
          </a>

          <a th:href="@{/mypage/performer/applied-performances}" class="menu-item">
            내가 신청한 공연
          </a>

          <a th:href="@{/mypage/performer/manage}" class="menu-item">
            신청자 관리
          </a>

        </div>

      </div>

    </div>

    <!-- ===== 하단 네비 ===== -->
    <div th:replace="~{fragments/performer/footer :: footer}"></div>

  </div>

</body>

</html>
