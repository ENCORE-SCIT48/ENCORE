<div th:fragment="profile(targetUrl)" class="profile-dropdown-wrap">
  <button type="button" class="profile-circle" th:classappend="${currentProfileImageUrl != null and !currentProfileImageUrl.isEmpty()} ? 'profile-circle--has-img'" aria-label="프로필 메뉴" data-profile-toggle>
    <img th:if="${currentProfileImageUrl != null and !currentProfileImageUrl.isEmpty()}" th:src="${currentProfileImageUrl}" alt="프로필" class="profile-circle-img" />
  </button>
  <ul class="profile-dropdown-menu" data-profile-menu>
    <!-- 비로그인: 로그인 -->
    <li sec:authorize="!isAuthenticated()">
      <a th:href="@{/auth/login}">로그인</a>
    </li>
    <!-- 로그인: 마이페이지, 프로필 변경, 로그아웃 -->
    <li sec:authorize="isAuthenticated()">
      <a th:href="@{/mypage}">마이페이지</a>
    </li>
    <li sec:authorize="isAuthenticated()">
      <a th:href="@{/profiles/select}">프로필 변경</a>
    </li>
    <li sec:authorize="isAuthenticated()">
      <form th:action="@{/logout}" method="post" class="form-inline-reset">
        <button type="submit">로그아웃</button>
      </form>
    </li>
  </ul>
</div>

<!-- 사용 예: <div th:replace="~{fragments/profile :: profile('/mypage')}"></div> -->
