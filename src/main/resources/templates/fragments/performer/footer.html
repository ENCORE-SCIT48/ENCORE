<footer th:fragment="footer">

  <style>
    .footer-wrapper {
      width: 100%;
      background-color: #333333;
      padding: 20px 0;
      display: flex;
      justify-content: center;
      border-top: 2px solid #E63946;
    }

    .footer-container {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .footer-link {
      text-decoration: none;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      transition: 0.2s;
    }

    .footer-link:hover {
      color: #E63946;
    }
  </style>

  <div class="footer-wrapper">
    <div class="footer-container">

      <a th:href="@{/posts/performance}" class="footer-link">모집글</a>
      <a th:href="@{/performer/venueList}" class="footer-link">공연장리스트</a>
      <a th:href="@{/}" class="footer-link">홈</a>
      <a th:href="@{/performer/directMessage}" class="footer-link">DM</a>
      <a th:href="@{/performer/chat}" class="footer-link">채팅방</a>

    </div>
  </div>

</footer>
