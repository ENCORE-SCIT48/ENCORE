<footer th:fragment="footer(items)">
    <link rel="stylesheet" th:href="@{/css/fragments/footer.css}">

    <div class="footer-wrapper">
        <div class="footer-container">
            <a th:each="item : ${items != null ? items : {}}" th:href="${item.href}" class="footer-link" th:text="${item.label}">
            </a>
        </div>
    </div>

</footer>
