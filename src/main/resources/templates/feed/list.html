<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>피드</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/feed/list.css}" />
</head>

<body>
<div class="app-wrapper">
    <main class="app-main">
        <header class="app-header">
            <!-- profile fragment는 파라미터 필수 -->
            <div th:replace="~{fragments/profile :: profile('/my-info')}"></div>

            <h1 class="feed-title">피드</h1>
        </header>

        <section class="feed-section">
            <div id="feedList" class="feed-list">
                <!-- JS 렌더링 -->
            </div>

            <div id="feedEmpty" class="text-center text-secondary mt-4 d-none">
                아직 피드가 없습니다.
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/performer/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/feed/list.js}"></script>
</body>
</html>
