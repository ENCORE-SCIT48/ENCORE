<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>공연장 찾기</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/venue/performerVenueList.css}"/>
</head>
<body>
<div class="app-wrapper">

    <!-- 헤더 -->
    <header class="app-header">
        <span class="header-title">공연장 찾기</span>
        <a th:href="@{/venues/reservations/my}" class="btn-my">
            <i class="bi bi-calendar-check"></i>
            <span>내 대관</span>
        </a>
    </header>

    <!-- 검색 -->
    <div class="search-wrap">
        <div class="search-inner">
            <i class="bi bi-search search-icon"></i>
            <input
                id="venueSearchInput"
                type="search"
                class="search-input"
                placeholder="공연장명·주소로 검색"
                autocomplete="off"
                data-size="10"
            />
        </div>
    </div>

    <!-- 목록 -->
    <main class="app-main">
        <div id="venueList" class="venue-list"></div>
        <div id="venueEmpty" class="empty-state d-none">
            <i class="bi bi-building-x"></i>
            <p>검색 결과가 없습니다.</p>
        </div>
    </main>

    <!-- 하단 푸터 -->
    <div class="footer-wrapper">
        <a th:href="@{/posts/performance}" class="footer-link">
            <i class="bi bi-file-text"></i><span>모집글</span>
        </a>
        <a th:href="@{/venues/performer}" class="footer-link active">
            <i class="bi bi-building"></i><span>공연장</span>
        </a>
        <a th:href="@{/feed}" class="footer-link">
            <i class="bi bi-house"></i><span>홈</span>
        </a>
        <a th:href="@{/dm/list}" class="footer-link">
            <i class="bi bi-chat-dots"></i><span>DM</span>
        </a>
        <a th:href="@{/chats}" class="footer-link">
            <i class="bi bi-people"></i><span>채팅</span>
        </a>
    </div>

</div>
<script th:src="@{/js/venue/performerVenueList.js}" defer></script>
</body>
</html>
