<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>공연장 상세</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/venue/list.css}" />
  <link rel="stylesheet" th:href="@{/css/venue/detail.css}" />
</head>

<body>
  <div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbar(${targetUrl})}"></div>
    <main class="app-main">
      <header class="app-header"></header>

      <div id="venueDetailWrap" class="venue-detail-header">
        <h1 class="venue-detail-name" id="venueName">공연장명</h1>
        <p class="venue-detail-meta" id="venueMeta">주소 · 연락처</p>
        <p class="venue-detail-meta" id="venueDesc"></p>
      </div>

      <section class="seat-review-section" th:if="${activeMode == 'ROLE_USER'}">
        <h3>좌석 리뷰</h3>
        <p class="text-muted small">이 공연장에서 관람한 공연을 선택한 뒤, 좌석 리뷰를 작성할 수 있습니다. (관람객만 작성 가능)</p>
        <div class="seat-review-actions">


          <select id="performanceSelect" class="form-select form-select-sm">
            <option value="">공연 선택</option>
          </select>

          <button type="button" class="btn btn-primary btn-sm btn-seat-review" id="btnSeatReviewWrite" disabled>
            좌석 리뷰 작성
          </button>
        </div>
      </section>

      <!-- 공연자 -->
      <div th:if="${activeMode == 'ROLE_PERFORMER'}">

        <a th:href="@{/venues/{venueId}/reservation(venueId=${venueId})}" class="btn btn-success btn-sm">
          대관 신청
        </a>
      </div>


    </main>
    <div th:replace="~{fragments/performer/footer :: footer}"></div>
  </div>

  <input type="hidden" id="venueId" th:value="${venueId}">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/venue/detail.js}"></script>
</body>

</html>
