<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대관 요청 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/venue/venueReservations.css}">
</head>
<body>
<div class="app-wrapper">

    <header class="app-header">
        <a href="javascript:history.back()" class="btn-back">
            <i class="bi bi-chevron-left"></i>
        </a>
        <span class="header-title" id="headerTitle">대관 요청 관리</span>
    </header>

    <main class="app-main">
        <!-- 공연장 탭 (가로 스크롤) -->
        <div class="venue-tabs-wrapper">
            <div class="venue-tabs" id="venueTabs">
                <!-- JS에서 동적 렌더링 -->
            </div>
        </div>

        <!-- 상태 필터 탭 -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-status="ALL">전체</button>
            <button class="filter-tab" data-status="PENDING">대기중</button>
            <button class="filter-tab" data-status="APPROVED">승인됨</button>
            <button class="filter-tab" data-status="REJECTED">거절됨</button>
        </div>

        <div id="reservationList">
            <div class="loading">
                <div class="spinner-border text-danger" role="status" style="width:2rem;height:2rem;"></div>
            </div>
        </div>
    </main>

    <div class="footer-wrapper">
        <a th:href="@{/venues}" class="footer-link">공연장</a>
        <a th:href="@{/}" class="footer-link">홈</a>
        <a th:href="@{/dm/list}" class="footer-link">DM</a>
    </div>
</div>

<div class="toast-wrap" id="toastWrap" style="display:none;">
    <div class="toast-msg" id="toastMsg"></div>
</div>

<script th:src="@{/js/venue/venueReservations.js}" defer></script>
</body>
</html>
