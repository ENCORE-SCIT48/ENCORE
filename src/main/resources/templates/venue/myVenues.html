<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>내 공연장 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/theme.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/venue/myVenues.css}" />
</head>
<body>
<div class="app-wrapper">

    <header class="app-header">
        <a th:href="@{/mypage}" class="btn-back" title="마이페이지">
            <i class="bi bi-chevron-left"></i>
        </a>
        <span class="header-title">내 공연장 관리</span>
        <a th:href="@{/venues/new}" class="btn-add">
            <i class="bi bi-plus-lg"></i>
        </a>
    </header>

    <main class="app-main">
        <div id="venueList">
            <div class="loading">
                <div class="spinner-border text-danger" role="status" style="width:2rem;height:2rem;"></div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/performer/footer :: footer}"></div>
</div>

<div class="toast-wrap" id="toastWrap" style="display:none;">
    <div class="toast-msg" id="toastMsg"></div>
</div>

<script th:src="@{/js/venue/myVenues.js}" defer></script>
</body>
</html>
