<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공연 채팅 리스트</title>

    <!-- CSS 라이브러리 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- 커스텀 CSS -->
    <link rel="stylesheet" th:href="@{/css/chat/chat.css}">
    <link rel="stylesheet" th:href="@{/css/chat/chat-list.css}">

    <!-- JS 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>

<body>
<div class="app-container">

    <!-- ===== 상단 헤더 ===== -->
    <header class="app-header d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <button class="back-btn" th:onclick="|location.href='/performances/${performanceId}'|" aria-label="뒤로가기">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h3 class="app-title" th:text="${performanceTitle}">공연 제목</h3>
        </div>

        <a th:href="@{/performances/{id}/chats/new(id=${performanceId})}" class="write-btn" aria-label="채팅방 생성">
            <i class="fa-solid fa-plus"></i>
        </a>
    </header>

    <!-- ===== 본문 ===== -->
    <main class="app-content">

        <!-- 검색 / 필터 영역 -->
        <section class="search-container mb-3">
            <div class="input-group">
                <select class="form-select" id="searchType">
                    <option value="title">제목</option>
                    <option value="titleContent">제목+내용</option>
                </select>
                <input type="text" id="keyword" class="form-control" placeholder="검색어 입력">
                <button class="btn btn-outline-secondary" type="button" id="searchBtn" aria-label="검색">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div class="form-check form-switch mt-2">
                <input class="form-check-input" type="checkbox" id="excludeClosed" checked>
                <label class="form-check-label" for="excludeClosed">
                    모집 중인 방만 보기
                </label>
            </div>
        </section>

        <!-- 전체 채팅방 -->
        <section th:if="${performanceAllChatPost != null}" class="chat-global-section"
                 th:onclick="|location.href='/performances/${performanceId}/chat/${performanceAllChatPost.id}'|">
            <span th:text="${performanceTitle} + ' 전체 채팅방'">전체 채팅방</span>
        </section>

        <!-- 커뮤니티 채팅방 리스트 -->
        <p class="section-label">커뮤니티 채팅방</p>
        <div id="chat-list-container" th:attr="data-performance-id=${performanceId}">
            <!-- JS에서 리스트 렌더링 -->
        </div>

    </main>
    <div th:replace="~{fragments/performer/footer :: footer}"></div>
</div>

<!-- 커스텀 JS -->
<script th:src="@{/js/chat/chatPerformanceList.js}"></script>
</body>
</html>
