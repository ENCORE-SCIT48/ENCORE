<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>채팅방 생성</title>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/chat/chat.css}">
    <link rel="stylesheet" th:href="@{/css/chat/chat-post-form.css}">

</head>

<body>
<div class="app-container">

    <!-- ===== 상단 헤더 ===== -->
    <header class="app-header">
        <button id="backBtn" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </button>

        <h1 class="app-title">채팅방 생성</h1>

        <!-- 우측 여백 맞추기용 더미 -->
        <div style="width: 36px;"></div>
    </header>

    <!-- ===== 스크롤 영역 ===== -->
    <main class="app-content">

        <section class="chat-form">
            <form id="chatPostForm">
                <input type="hidden" id="performanceId" th:value="${performanceId}">

                <div class="mb-3">
                    <label>공연명</label>
                    <input type="text" th:value="${performanceId}" class="form-control" readonly>
                </div>

                <div class="mb-3">
                    <label for="title">제목</label>
                    <input type="text" id="title" class="form-control" placeholder="제목을 입력하세요"
                           th:value="${chatPost.title}" required>
                </div>

                <div class="mb-3">
                    <label for="content">내용</label>
                    <textarea id="content" class="form-control" rows="5" placeholder="내용을 입력하세요"
                              th:text="${chatPost.content}" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="maxMember">모집 인원</label>
                    <input type="number" id="maxMember" class="form-control" min="1"
                           th:value="${chatPost.maxMember}" readonly>
                </div>
                <div class="mb-3">
                    <label>채팅방 상태</label>

                    <div class="status-toggle">
                        <button type="button" class="status-btn active" data-status="OPEN">
                            모집중
                        </button>

                        <button type="button" class="status-btn" data-status="CLOSED">
                            모집완료
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">수정하기</button>
            </form>
        </section>

    </main>
</div>
<script th:src="@{/js/chat/chatPostUpdateForm.js}"></script>
</body>

</html>
