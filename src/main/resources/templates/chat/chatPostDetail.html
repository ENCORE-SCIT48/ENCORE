<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>채팅 커뮤니티 게시판 상세</title>

    <!-- CSS 라이브러리 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-pap..." crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <!-- 커스텀 CSS -->
    <link rel="stylesheet" th:href="@{/css/chat/chat.css}"/>
    <link rel="stylesheet" th:href="@{/css/chat/chat-post-detail.css}"/>

    <!-- JS 라이브러리 -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>

<body>
<div class="app-container">

    <!-- ===== 상단 헤더 ===== -->
    <header class="app-header">
        <button type="button" onclick="history.back();" class="back-btn" aria-label="뒤로가기">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <a th:href="@{/performances/{id}/chats(id=${performanceId})}" class="app-title"
           th:text="${chatPost.performanceTitle}">
            공연 이름
        </a>
        <div class="header-spacer"></div>
    </header>

    <!-- ===== 본문 ===== -->
    <main class="app-content">

        <article class="chat-post-detail">

            <!-- 게시글 제목 -->
            <h2 class="post-title">
                <span
                    th:text="${chatPost.status == 'OPEN' ? '[모집중]' : '[모집완료]'}"></span>
                <span th:text="${chatPost.title}">제목</span>
            </h2>

            <!-- 작성자 / 작성일 / 인원 정보 -->
            <div class="post-meta">
                <a th:href="@{/member/profile/{profileId}/{profileMode}(profileId=${chatPost.writerId},
                profileMode=${chatPost.writerProfileMode})}" class="author-nickname-link">
                    <span class="author-nickname" th:text="${chatPost.writerName}">닉네임</span>
                </a>
                <span> | </span>
                <span th:text="${#temporals.format(chatPost.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</span>
                <span class="member-count" th:text="${chatPost.currentMember} + '/' + ${chatPost.maxMember}">1/4</span>
            </div>

            <!-- 수정/삭제 버튼 -->
            <div class="post-actions" th:if="${isWriter}">
                <button
                    class="btn-action" id="btn-edit"
                    th:data-performance-id="${performanceId}"
                    th:data-id="${chatPost.id}">
                    수정하기
                </button>

                <button
                    class="btn-action" id="btn-delete"
                    th:data-performance-id="${performanceId}"
                    th:data-id="${chatPost.id}">
                    삭제하기
                </button>
            </div>

            <!-- 게시글 내용 -->
            <section class="post-content" th:text="${chatPost.content}">
                글 상세내용
            </section>

            <!-- 채팅방 참가 버튼 -->
            <button id="btn-join" th:if="${canJoin}" class="btn-join" th:data-room-id="${roomId}">
                채팅방 참가하기
            </button>

            <!-- 신고 버튼 -->
            <button id="btn-report"
                    class="btn-report"
                    th:data-target-id="${chatPost.id}"
                    th:data-target-type="CHAT_ROOM"
                    th:data-target-name="${chatPost.title}">신고하기
            </button>

        </article>
    </main>
    <div th:replace="~{fragments/performer/footer :: footer}"></div>
</div>

<!-- 커스텀 JS -->
<script th:src="@{/js/chat/chatPostDetail.js}"></script>
</body>
</html>
