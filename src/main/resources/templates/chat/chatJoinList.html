<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅방 리스트 | 공연 톡</title>

    <!-- CSS 라이브러리 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- 커스텀 CSS -->
    <link rel="stylesheet" th:href="@{/css/chat/chat.css}">
    <link rel="stylesheet" th:href="@{/css/chat/chat-list.css}">

    <!-- JS 라이브러리 -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
</head>

<body>
<div class="app-container">

    <!-- ===== 상단 헤더 ===== -->
    <header class="app-header d-flex align-items-center gap-2">
        <button class="back-btn" onclick="history.back()" aria-label="뒤로가기">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h3 class="app-title">채팅방</h3>
    </header>

    <!-- ===== 본문 ===== -->
    <main class="app-content">

        <!-- 참여중 채팅방 섹션 -->
        <section>
            <p class="section-label d-flex justify-content-between align-items-center">
                참여중 채팅방
                <button id="btn-show-all-joined" class="btn btn-sm btn-outline-primary"
                        title="전체 보기">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </p>
            <div id="joined-chat-container" th:attr="data-performance-id=${performanceId}">
                <!-- JS에서 렌더링 -->
            </div>
            <p class="text-muted small mt-2">
                로그인 후 공연 상세에서 채팅방을 생성하거나 참여할 수 있습니다.
            </p>
        </section>

        <!-- HOT 채팅방 섹션 -->
        <section class="mt-4">
            <p class="section-label">HOT 채팅방</p>
            <div id="chat-list-container" th:attr="data-performance-id=${performanceId}">
                <!-- JS에서 렌더링 -->
            </div>
        </section>

    </main>

    <!-- ===== 푸터 ===== -->
    <footer class="app-footer">
        <!-- 필요 시 추가 -->
    </footer>

</div>

<!-- 커스텀 JS -->
<script th:src="@{/js/chat/chatJoinList.js}"></script>
</body>
</html>
