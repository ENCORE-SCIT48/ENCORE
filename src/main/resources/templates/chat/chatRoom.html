<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅방 | 공연 톡</title>

    <!-- Bootstrap + FontAwesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/chat/chat.css}">
    <link rel="stylesheet" th:href="@{/css/chat/chat-list.css}">
</head>

<body>

<div class="app-container">
    <!-- 헤더 -->
    <header class="app-header">
        <button type="button" onclick="history.back();" class="btn-icon" aria-label="뒤로가기">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <h1 class="chat-title-text" th:text="${roomTitle}">채팅방 이름</h1>

        <button type="button" class="btn-icon" data-bs-toggle="offcanvas" data-bs-target="#chatSidebar"
                aria-label="메뉴 열기">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <!-- 채팅 메시지 영역 -->
    <main class="app-content chat-area" id="chatArea">
        <!-- 대화 없음 표시 -->
        <div class="message-row system-msg" th:if="${#lists.isEmpty(chatMessages)}">
            <p class="text-center text-muted small">대화가 시작되었습니다.</p>
        </div>

    </main>

    <!-- 입력 영역 -->
    <footer class="chat-input-area border-top p-2 bg-white">
        <div class="input-group">
            <input type="text" id="chatInput" class="form-control border-0"
                   placeholder="메시지를 입력하세요." aria-label="채팅 입력창">
            <button type="button" id="sendBtn" class="btn btn-danger px-4">전송</button>
        </div>
    </footer>
</div>

<!-- 사이드바 -->
<aside class="offcanvas offcanvas-end" tabindex="-1" id="chatSidebar" aria-labelledby="chatSidebarLabel">
    <div class="offcanvas-header border-bottom">
        <h2 class="offcanvas-title fs-5" id="chatSidebarLabel">대화 상대</h2>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="닫기"></button>
    </div>

    <div class="offcanvas-body d-flex flex-column">
        <ul class="list-group list-group-flush mb-auto" id="participantList">
            <li class="list-group-item text-center py-4">
                <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
            </li>
        </ul>

        <nav class="mt-auto border-top pt-3">
            <button type="button" class="btn btn-outline-danger w-100 py-2" id="leaveChatBtn">
                <i class="fa-solid fa-right-from-bracket me-2"></i> 채팅방 나가기
            </button>
        </nav>
    </div>
</aside>

<!-- JS 라이브러리 -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<!-- Thymeleaf 변수 -->
<script th:inline="javascript">
    const CURRENT_PROFILE_ID = [[${currentProfileId}]];
    const CURRENT_MODE = [[${currentMode}]];
    const ROOM_ID = [[${roomId}]];
</script>

<!-- Custom JS -->
<script th:src="@{/js/chat/chatRoom.js}"></script>

</body>
</html>
