<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅방 | 공연 톡</title>

    <!-- Bootstrap + FontAwesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/chat/chat.css}">
    <link rel="stylesheet" th:href="@{/css/chat/chat-list.css}">
</head>

<body>

<div class="app-container">
    <!-- 헤더 -->
    <header class="app-header">
        <button type="button" onclick="history.back();" class="btn-icon">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <a th:href="@{/member/profile/{id}/{mode}(id=${userDetail.otherProfileId}, mode=${userDetail.otherProfileMode})}"
           class="chat-header-link">
            <img th:src="${userDetail.otherProfileImg} != null
        ? @{${userDetail.otherProfileImg}}
        : @{/image/default-profile.png}" class="header-avatar">
            <h1 class="chat-title-text" th:text="${userDetail.otherNickname}">상대방 이름</h1>
        </a>
        <div class="header-right-empty"></div>
    </header>

    <!-- 채팅 메시지 영역 -->
    <main class="app-content chat-area" id="chatArea">
        <!-- 대화 없음 표시 -->
        <div class="message-row system-msg" th:if="${#lists.isEmpty(chatMessages)}">
            <p class="text-center text-muted small">대화가 시작되었습니다.</p>
        </div>

        <!-- 메시지 반복 출력 -->
        <div class="message-row mb-3" th:each="msg : ${chatMessages}">
            <div class="avatar"></div>
            <div class="message-wrapper">
                <div class="message-name" th:text="${msg.senderNickname}">사용자</div>
                <div class="message-content" th:text="${msg.content}">메시지 내용</div>
            </div>
        </div>
    </main>
    <input type="hidden" id="participantStatus" th:value="${participantStatus}">
    <!-- 입력 영역 -->
    <footer class="chat-input-area border-top p-2 bg-white">
        <div class="input-group">
            <input type="text" id="chatInput" class="form-control border-0" placeholder="메시지를 입력하세요."
                   style="display:none;"/>

            <button type="button" id="sendBtn" class="btn btn-danger px-4" style="display:none;">전송
            </button>

            <div id="actionBtnGroup" class="w-100 d-flex gap-2">
                <button type="button" id="acceptBtn" class="btn btn-dm-accept flex-grow-1">수락</button>
                <button type="button" id="rejectBtn" class="btn btn-dm-reject flex-grow-1">거절</button>
            </div>
        </div>
    </footer>


</div>

<!-- JS 라이브러리 -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<!-- Thymeleaf 변수 -->
<script th:inline="javascript">
    const ROOM_ID = [[${roomId}]];
    let PARTICIPANT_STATUS = [[${participantStatus}]];
    const CURRENT_PROFILE_ID = [[${activeProfileId}]];
    const CURRENT_MODE = [[${activeMode}]];
</script>

<!-- Custom JS -->
<script th:src="@{/js/chat/dm/dmRoom.js}"></script>

</body>

</html>
