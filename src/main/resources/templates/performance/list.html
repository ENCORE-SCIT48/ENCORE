<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공연 리스트</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" th:href="@{/css/theme.css}"/>
    <link
        rel="stylesheet"
        th:href="@{/css/performance/list.css}"
    >
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbar(${targetUrl})}"></div>
    <div class="top-slot"></div>

    <main class="app-main">
        <!-- 검색: 입력 넓게, 버튼 오른쪽 고정 (theme UX) -->
        <form
            class="d-flex performance-search-form mb-3"
            role="search"
            onsubmit="return false;"
        >
            <input
                id="keyword"
                class="form-control me-2"
                type="search"
                placeholder="공연명으로 검색"
                aria-label="공연 검색"
            >
            <button
                id="searchBtn"
                class="btn btn-secondary"
                type="button"
            >
                검색
            </button>
        </form>

        <!-- 핫한 공연 캐러셀 -->
        <section class="hot-carousel-section mb-3">
            <div class="hot-carousel-header d-flex justify-content-between align-items-center mb-2">
                <h2 class="hot-carousel-title mb-0">핫한 공연</h2>
                <a
                    class="btn btn-sm btn-primary"
                    th:if="${#authorization.expression('hasRole(''PERFORMER'')')}"
                    th:href="@{/performances/new}"
                >
                    공연 등록
                </a>
            </div>

            <div class="hot-carousel-wrap">
                <button type="button" class="hot-carousel-btn hot-carousel-prev" id="hotCarouselPrev" aria-label="이전">‹</button>
                <button type="button" class="hot-carousel-btn hot-carousel-next" id="hotCarouselNext" aria-label="다음">›</button>

                <div class="hot-carousel-track-wrap">
                    <div class="hot-carousel-track" id="hotCarouselTrack">
                        <!-- JS에서 슬라이드 채움. 없을 때 플레이스홀더 -->
                        <div class="hot-carousel-placeholder" id="hotCarouselPlaceholder">
                            <span class="text-muted">로딩 중...</span>
                        </div>
                    </div>
                </div>

                <div class="hot-carousel-indicator" id="hotCarouselIndicator">
                    <span class="hot-carousel-current" id="hotCarouselCurrent">1</span>
                    <span class="hot-carousel-sep">/</span>
                    <span class="hot-carousel-total" id="hotCarouselTotal">0</span>
                </div>
            </div>
        </section>

        <!-- 탭 -->
        <nav class="category-tabs mb-3">
            <button
                class="tab-btn active"
                data-category=""
                type="button"
            >
                전체
            </button>
            <button
                class="tab-btn"
                data-category="BAND"
                type="button"
            >
                밴드
            </button>
            <button
                class="tab-btn"
                data-category="MUSICAL"
                type="button"
            >
                뮤지컬
            </button>
            <button
                class="tab-btn"
                data-category="PLAY"
                type="button"
            >
                연극
            </button>
            <button
                class="tab-btn"
                data-filter="BOOKMARK"
                type="button"
            >
                북마크리스트
            </button>
            <button
                class="tab-btn"
                data-filter="VIEWED"
                type="button"
            >
                본공연리스트
            </button>
        </nav>

        <!-- 그리드 자리(초기 더미 렌더링) -->
        <div
            id="gridWrap"
            th:replace="~{performance/grid :: grid}"
        ></div>

        <!-- 더보기 (마지막 페이지가 아니면 표시) -->
        <div class="load-more-wrap d-flex justify-content-center mt-4">
            <button
                id="loadMoreBtn"
                class="btn btn-outline-secondary"
                type="button"
                style="display:none;"
            >
                더보기
            </button>
        </div>
    </main>

    <div class="bottom-slot"></div>
    <div th:replace="~{fragments/performer/footer :: footer}"></div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/js/performance/list.js}"></script>
</body>
</html>
