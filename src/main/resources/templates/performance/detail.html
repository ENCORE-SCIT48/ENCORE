<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>공연 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/theme.css}"/>
    <link rel="stylesheet" th:href="@{/css/performance/detail.css}"/>
</head>

<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbar(${targetUrl})}"></div>
    <main class="app-main">
        <!-- 상단 큰 포스터 영역 (Encore pick 클릭 시 스크롤 대상) -->
        <section class="poster-area" id="performanceHeader">
            <img id="posterImage" class="poster-image" src="" alt="공연 포스터" style="display:none;"/>
            <div class="poster-placeholder" id="posterPlaceholder">
                <span>공연 대표 이미지</span>
            </div>
        </section>

        <!-- 본문 -->
        <section class="detail-body">
            <!-- 상단 라인: 카테고리 / 버튼들 -->
            <div class="top-row">
                <div class="category-text" id="categoryText">-</div>

                <div class="action-buttons">
                    <button type="button" class="wish-btn" id="wishBtn" aria-label="볼 공연 찜">
                        <img id="wishIcon" th:src="@{/image/wish_off.png}" src="/image/wish_off.png" alt="볼 공연 찜"/>
                    </button>
                    <button type="button" class="watched-btn" id="watchedBtn" aria-label="본 공연">
                        <img id="watchedIcon" th:src="@{/image/watched_off.png}" src="/image/watched_off.png"
                             alt="본 공연"/>
                    </button>
                    <button type="button" class="reported-btn" id="reportedBtn" aria-label="신고">
                        <img id="reportedIcon" th:src="@{/image/reported_off.png}" src="/image/reported_off.png"
                             alt="신고"/>
                    </button>
                </div>
            </div>

            <h1 class="perf-title" id="perfTitle">공연 제목</h1>

            <!-- 지역/공연장 + 지도 버튼 -->
            <div class="meta-row">
                <div class="meta-text" id="metaText">지역 · 공연장이름</div>
                <button type="button" class="map-pill" id="mapBtn">지도</button>
            </div>

            <div class="divider"></div>

            <!-- 본 공연 관람 후 채팅 참여 CTA (본 공연 체크 시에만 JS에서 노출) -->
            <div class="chat-cta" id="chatCta" style="display:none;">
                <div class="chat-cta-text">
                    이 공연을 본 관객들과 이야기 나눠볼까요?
                </div>
                <button type="button" class="chat-cta-btn" id="chatCtaBtn">공연 채팅 참여</button>
            </div>

            <!-- 탭 -->
            <div class="tab-row">
                <button type="button" class="tab-btn active" data-tab="desc">공연상세설명</button>
                <a th:href="@{/performances/{id}/chats(id=${performanceId})}" class="tab-btn" data-tab="chat">공연채팅이동</a>
                <button type="button" class="tab-btn" data-tab="review">
                    공연후기 <span class="rating" id="ratingText">-</span>
                </button>
                <button type="button" class="tab-btn" data-tab="seatReview">좌석 리뷰</button>
            </div>

            <!-- 탭 콘텐츠 -->
            <div class="tab-content-wrap">
                <div id="tab-desc" class="tab-content active">
                    <div class="desc-text" id="descText">공연상세설명</div>
                </div>

                <div id="tab-review" class="tab-content">
                    <!-- 리뷰 작성 + 정렬 -->
                    <div class="review-controls">
                        <button type="button" class="review-write-btn d-none" id="writeReviewBtn">
                            리뷰 작성
                        </button>

                        <select id="reviewSort" class="form-select form-select-sm review-sort">
                            <option value="latest" selected>최신순</option>
                            <option value="rating">별점순</option>
                        </select>
                    </div>

                    <!-- 후기 리스트 -->
                    <div class="review-list" id="reviewList"></div>

                    <!-- 페이징 -->
                    <div class="review-more-wrap" id="reviewMoreWrap" style="display:none;">
                        <button type="button" class="review-more-btn" id="reviewMoreBtn">더보기</button>
                    </div>

                    <!-- 빈 상태 -->
                    <div class="review-empty" id="reviewEmpty" style="display:none;">
                        아직 등록된 후기가 없어요
                    </div>
                </div>

                <!-- 좌석 리뷰 탭: 배치도 + 마우스 오버 시 해당 좌석 리뷰 툴팁 -->
                <div id="tab-seatReview" class="tab-content">
                    <div id="seatReviewMapWrap" class="seat-review-map-wrap">
                        <div id="seatReviewFloorTabs" class="seat-floor-tabs"></div>
                        <div class="seat-canvas-wrapper">
                            <canvas id="seatReviewCanvas"></canvas>
                        </div>
                        <p class="seat-review-hint">좌석에 마우스를 올리면 리뷰 내용을 볼 수 있습니다</p>
                    </div>
                    <div id="seatReviewEmpty" class="review-empty" style="display:none;">
                        이 공연의 좌석 배치 정보가 없거나, 좌석 리뷰가 없습니다.
                    </div>
                    <div class="seat-review-write-wrap mt-2">
                        <a id="seatReviewWriteLink" th:href="@{/performances/{id}/reviews/seats/new(id=${performanceId})}" class="btn btn-outline-primary btn-sm">좌석 리뷰 작성</a>
                    </div>
                    <div id="seatReviewTooltip" class="seat-review-tooltip" style="display:none;"></div>
                </div>
            </div>

            <!-- 연관 정보: 이 공연의 아티스트 / 이 공연이 열리는 무대 (데이터 있을 때만 JS에서 노출) -->
            <section class="related-section">
                <div class="related-item" id="relatedPerformer" style="display:none;">
                    <div class="related-label">이 공연의 아티스트</div>
                    <div class="related-value" id="relatedPerformerName"></div>
                </div>
                <div class="related-item" id="relatedVenue" style="display:none;">
                    <div class="related-label">이 공연이 열리는 무대</div>
                    <button type="button" class="related-link-btn" id="relatedVenueBtn">공연장 상세보기</button>
                </div>
            </section>

            <!-- 공연자 본인만 보는 수정/삭제 액션 (소유 여부는 JS에서 /api/performances/{id}/ownership 로 결정) -->
            <section class="perf-owner-actions" id="perfOwnerActions" style="display:none;">
                <button type="button" class="btn btn-outline-secondary btn-sm" id="editPerformanceBtn">공연 수정</button>
                <button type="button" class="btn btn-outline-danger btn-sm" id="deletePerformanceBtn">공연 삭제</button>
            </section>
        </section>

        <!-- performanceId 전달 -->
        <input type="hidden" id="performanceId" th:value="${performanceId}"/>

        <!-- 로그인 유저 id 전달(내 리뷰 판별용) -->
        <input type="hidden" id="loginUserId" th:value="${loginUserId}"/>
    </main>

    <div class="footer-space"></div>
    <div th:replace="~{fragments/performer/footer :: footer}"></div>
</div>

<!-- 리뷰 상세 모달 -->
<div class="modal fade" id="reviewDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content review-modal">
            <div class="modal-header">
                <div class="modal-title-wrap">
                    <div class="modal-stars" id="modalStars"></div>
                    <div class="modal-meta" id="modalMeta"></div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
            </div>

            <div class="modal-body">
                <div class="modal-encore-pick text-muted small mb-2" id="modalEncorePick" style="display:none;"></div>
                <div class="modal-content-text" id="modalContent"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/js/performance/detail.js}"></script>
</body>
</html>
