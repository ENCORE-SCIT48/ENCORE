<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>좌석 리뷰</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/performance/reviewWrite.css}"/>
</head>

<body>
<div class="app-wrapper">
    <main class="app-main review-write-page">

        <header class="review-header">
            <button type="button" class="back-btn" id="backBtn" aria-label="뒤로가기">←</button>
            <h1 class="header-title">좌석 리뷰</h1>
        </header>

        <section class="perf-info">
            <h2 class="perf-title" id="perfTitle">공연제목</h2>
            <p class="perf-sub" id="perfSub">공연 정보 · 장르 · 제작연도</p>
        </section>

        <!-- 좌석 선택: 배치도가 있으면 캔버스로 선택, 없으면 드롭다운만 -->
        <section class="content-wrap seat-select-section">
            <label class="content-label">좌석 선택</label>
            <div id="seatMapWrap" class="seat-map-wrap d-none">
                <div id="seatFloorTabs" class="seat-floor-tabs"></div>
                <div class="seat-canvas-wrapper">
                    <canvas id="seatCanvas" class="seat-canvas"></canvas>
                </div>
                <p class="seat-map-hint">좌석을 클릭하면 선택됩니다</p>
            </div>
            <select id="seatId" class="form-select content-input">
                <option value="">좌석을 선택해 주세요</option>
            </select>
        </section>

        <!-- 별점 -->
        <section class="rating-wrap" aria-label="별점 선택">
            <div class="stars" id="stars">
                <button type="button" class="star" data-value="1" aria-label="1점">☆</button>
                <button type="button" class="star" data-value="2" aria-label="2점">☆</button>
                <button type="button" class="star" data-value="3" aria-label="3점">☆</button>
                <button type="button" class="star" data-value="4" aria-label="4점">☆</button>
                <button type="button" class="star" data-value="5" aria-label="5점">☆</button>
            </div>
            <div class="rating-hint" id="ratingHint">별점을 선택해 주세요</div>
        </section>

        <section class="content-wrap">
            <label class="content-label" for="content">리뷰내용</label>
            <textarea
                id="content"
                class="content-input"
                rows="8"
                placeholder="해당 좌석에서의 시야, 음향, 분위기 등을 5자 이상 작성해 주세요."
            ></textarea>
        </section>

        <section class="submit-wrap">
            <button type="button" class="submit-btn" id="submitBtn" disabled>작성</button>
        </section>

        <input type="hidden" id="performanceId" th:value="${performanceId}">
        <input type="hidden" id="selectedRating" value="0">
        <input type="hidden" id="reviewId" th:value="${reviewId}">
    </main>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/js/performance/seatReviewWrite.js}"></script>
</body>
</html>
