<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${performanceId} != null ? '공연 수정' : '공연 등록'">공연 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/performance/detail.css}"/>
    <link rel="stylesheet" th:href="@{/css/performance/new.css}"/>
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/topbar :: topbar('/performances')}"></div>
    <main class="app-main">
        <header class="app-header">
            <h1 class="feed-title" th:text="${performanceId} != null ? '공연 수정' : '공연 등록'">공연 등록</h1>
        </header>

        <section class="perf-form-wrapper">
            <div class="perf-form-title" th:text="${performanceId} != null ? '공연 정보 수정' : '새 공연 만들기'">새 공연 만들기</div>
            <form id="performanceForm" onsubmit="return false;">
                <input type="hidden" id="performanceId" th:value="${performanceId} ?: ''"/>
                <div class="perf-form-group">
                    <label for="title" class="form-label">공연 제목</label>
                    <input id="title" name="title" type="text" class="form-control" placeholder="공연 제목을 입력하세요" required>
                </div>

                <div class="perf-form-group">
                    <label for="venueId" class="form-label">공연장</label>
                    <select id="venueId" name="venueId" class="form-select" required>
                        <option value="">공연장을 선택하세요</option>
                    </select>
                    <div class="form-text">등록된 공연장 목록에서 선택합니다.</div>
                </div>

                <div class="perf-form-group">
                    <label for="category" class="form-label">장르</label>
                    <select id="category" name="category" class="form-select">
                        <option value="">선택 안 함</option>
                        <option value="BAND">밴드</option>
                        <option value="MUSICAL">뮤지컬</option>
                        <option value="PLAY">연극</option>
                    </select>
                </div>

                <div class="perf-form-group">
                    <label for="capacity" class="form-label">예상 관객 수</label>
                    <input id="capacity" name="capacity" type="number" min="1" class="form-control" placeholder="예: 100">
                </div>

                <div class="perf-form-group">
                    <label for="performanceImageUrl" class="form-label">포스터 이미지 URL</label>
                    <input id="performanceImageUrl" name="performanceImageUrl" type="url" class="form-control" placeholder="https:// 예시">
                    <div class="form-text">파일 업로드 대신 URL로만 받습니다. (추후 확장 가능)</div>
                </div>

                <div class="perf-form-group">
                    <label for="description" class="form-label">공연 설명</label>
                    <textarea id="description" name="description" rows="4" class="form-control"
                              placeholder="공연에 대한 설명을 적어주세요"></textarea>
                </div>

                <div class="perf-form-actions">
                    <button type="button" class="btn btn-outline-secondary" onclick="history.back();">취소</button>
                    <button type="submit" id="saveBtn" class="btn btn-dark">등록하기</button>
                </div>
            </form>
        </section>
    </main>

    <div class="footer-space"></div>
    <div th:replace="~{fragments/performer/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/performance/new.js}"></script>
</body>
</html>
